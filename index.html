<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizTool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES & THEME (Matching your engine)
═══════════════════════════════════════════ */
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --accent:     #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg:         #f3f0eb;
  --surface:    #ffffff;
  --surface2:   #f8f6f1;
  --border:     #d0ccc5;
  --text:       #1c1917;
  --text-muted: #78716c;
  --accent:     #c27803;
  --accent-dim: rgba(194,120,3,0.10);
  --shadow:     0 4px 24px rgba(0,0,0,0.10);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  display: flex;
  flex-direction: column;
}
button, a { cursor: pointer; font-family: inherit; border: none; outline: none; text-decoration: none; }

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  flex: 1;
  color: var(--text);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all var(--transition);
  font-size: 1.1rem;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }

/* ═══════════════════════════════════════════
   MAIN LAYOUT & HERO
═══════════════════════════════════════════ */
.container {
  flex: 1;
  overflow-y: auto;
  padding: 3rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  text-align: center;
  max-width: 600px;
  margin-bottom: 3.5rem;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  line-height: 1.1;
  margin-bottom: 1rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--text-muted);
  font-size: 1.05rem;
}

/* ═══════════════════════════════════════════
   QUIZ GRID & CARDS
═══════════════════════════════════════════ */
.quiz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
  width: 100%;
  max-width: 1100px;
}
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease, border-color 0.3s ease;
}
.quiz-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}
.card-icon {
  width: 56px; height: 56px;
  background: var(--accent-dim);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 1.25rem;
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.card-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
  flex: 1; /* Pushes button to bottom */
}
.card-meta {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.meta-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 0.35rem 0.75rem;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-take-quiz {
  display: inline-block;
  text-align: center;
  width: 100%;
  padding: 0.85rem;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 0.95rem;
  transition: opacity var(--transition), transform var(--transition);
}
.btn-take-quiz:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-take-quiz:active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   GITHUB BUTTON
═══════════════════════════════════════════ */
.github-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.6rem 1.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-weight: 600;
  font-size: 0.9rem;
  transition: all var(--transition);
}
.github-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
}
</style>
</head>
<body>

  <!-- TOP NAVIGATION -->
  <div class="topbar">
    <div class="topbar-title">QuizTool</div>
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>

  <div class="container">
    <!-- HERO SECTION -->
    <header class="hero">
      <h1>Select Your <span>Exam</span></h1>
      <p>Test your knowledge across various subjects. Choose an exam below to begin.</p>
    </header>

    <!-- EXAMS GRID -->
    <div class="quiz-grid" id="quiz-grid">
      <!-- Cards are generated here via JavaScript -->
    </div>

    <!-- GITHUB BUTTON -->
    <div style="margin-top: 3rem; text-align: center;">
      <a href="https://github.com/eyad-elghareeb/QuizTool" target="_blank" rel="noopener noreferrer" class="github-btn">
        <svg style="width: 20px; height: 20px; margin-right: 8px; vertical-align: middle;" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-2.461 0-.542.195-.994.514-1.409-.512-1.582-1.19-2.017-1.19-2.017-.973-.665.073-.652.073-.652 1.076.075 1.641 1.106 1.641 1.106.95 1.622 2.495 1.155 3.101.881.096-.687.372-1.155.677-1.419-2.353-.267-4.822-1.175-4.822-2.183 0-.481.173-.929.459-1.294-.464-1.584-1.075-2.017-1.075-2.017-.967-.665.07-.652.07-.652 1.075.075 1.639 1.106 1.639 1.106.95 1.622 2.495 1.155 3.101.881.096-.687.372-1.155.677-1.419-2.353-.267-4.822-1.175-4.822-2.183 0-.481.173-.929.459-1.294"/>
        </svg>
        View on GitHub
      </a>
    </div>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────
   QUIZ CONFIGURATION — Easily add your separate HTML exams here!
──────────────────────────────────────────────────────────────────*/
const QUIZZES =[
  {
    title: "🔧 Quiz Maker",
    description: "Create your own custom quizzes with this easy tool",
    icon: "⚙️",
    tags: ["Tool", "Create"],
    url: "quiz-maker.html"
  },
  {
    title: "📱 Quiz Maker JS",
    description: "JavaScript-based quiz maker for interactive quizzes",
    icon: "💻",
    tags: ["Tool", "JavaScript"],
    url: "quiz-maker-js.html"
  },
  {
    title: "General Knowledge Quiz",
    description: "Test your knowledge across science, history, geography, and more.",
    icon: "🌍",
    tags: ["10 Questions", "General"],
    url: "quiz-template.html"
  }
  // To add a new exam, just duplicate a block above, change the text, and link the new file!
];

/* ─────────────────────────────────────────────────────────────────
   ENGINE LOGIC
──────────────────────────────────────────────────────────────────*/

// 1. Render the Quiz Cards dynamically
function renderQuizzes() {
  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = QUIZZES.map(quiz => `
    <div class="quiz-card">
      <div class="card-icon">${quiz.icon}</div>
      <h2 class="card-title">${quiz.title}</h2>
      <p class="card-desc">${quiz.description}</p>
      <div class="card-meta">
        ${quiz.tags.map(tag => `<span class="meta-badge">${tag}</span>`).join('')}
      </div>
      <a href="${quiz.url}" class="btn-take-quiz">Start Exam →</a>
    </div>
  `).join('');
}

// 2. Handle Theme Toggle (Maintains same theme logic as your templates)
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('quiz-theme', newTheme); // Save preference
  updateThemeIcon();
}

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-toggle').textContent = isDark ? '☀' : '☾';
}

// 3. Initialize on page load
function init() {
  // Check for saved theme preference
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }
  
  updateThemeIcon();
  renderQuizzes();
}

init();
</script>
</body>
</html>
