/* ────────────────────────────────────────────────────────────────

/* ─────────────────────────────────────────────────────────────────
   OSCE_CASE OBJECT — single case per file

   Mode is selected via "type":
   - "history" (default): Virtual patient history-taking OSCE
   - "data-interp":       Examiner presents data + asks oral questions

   HISTORY MODE EXAMPLE:
   {
     title:        "Case title",
     type:         "history", // or omit (default)
     specialty:    "Cardiology / Respiratory / etc.",
     difficulty:   "Foundational / Intermediate / Advanced",
     task:         "Take a focused history...",
     patient: { ... },
     hiddenProfile: { ... },
     rubric: { mustAsk: [...], bonus: [...] }
   }

   DATA-INTERP MODE EXAMPLE:
   {
     title:        "Data Interpretation — CBC",
     type:         "data-interp",
     specialty:    "Hematology",
     difficulty:   "Advanced",
     task:         "Interpret the data and answer the examiner's questions.",
     examiner: { name: "Dr. Smith", title: "Consultant Hematologist" },
     dataPresented: {
       scenario: "A 65-year-old man presents with fever 10 days post-chemo.",
       tables: [
         { title: "Complete Blood Count",
           headers: ["Parameter", "Result", "Reference"],
           rows: [
             ["Hb", "8.2 g/dL", "13.5-17.5"],
             ["WBC", "1.1 ×10³/µL", "4.0-11.0"]
           ]
         }
       ]
     },
     questions: [
       { id: "q1", question: "What is the most likely diagnosis?",
         answer: "Febrile neutropenia", rubric: "Must identify neutropenia" }
     ],
     rubric: { mustAsk: ["Identify febrile neutropenia"], bonus: [] }
   }

   ──────────────────────────────────────────────────────────────────*/

/* MODE: "history" (default) or "data-interp" — set via OSCE_CASE.type */

</script>
<script>
/* Engine loader — tries depth-aware path first, then local fallbacks for file:// previews */
(function () {
  var computedBase = '../'.repeat(
    Math.max(0, location.pathname.split('/').filter(Boolean).length - 2)
  );
  var candidates = location.protocol === 'file:'
    ? ['', computedBase, '../', '../../', '../../../']
    : [computedBase, '', '../', '../../', '../../../'];
  var tried = {};
  function loadNext() {
    var base = candidates.shift();
    if (base === undefined) return;
    if (tried[base]) return loadNext();
    tried[base] = true;
    window.__OSCE_ENGINE_BASE = base;
    var script = document.createElement('script');
    script.src = base + 'osce-engine.js';
    script.onerror = loadNext;
    document.body.appendChild(script);
  }
  loadNext();
})();
</script>
