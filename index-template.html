<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){var t=localStorage.getItem('quiz-theme')||'dark';var s=document.createElement('style');
s.textContent='html,body{background:'+(t==='light'?'#f3f0eb':'#0d1117')+';color:'+(t==='light'?'#1c1917':'#e6edf3')+';margin:0;padding:0;overflow:hidden;height:100%}';
document.head.appendChild(s)})();
</script>
<title>Quiz Hub</title>
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index-engine.css">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>

  <!-- TOP NAVIGATION -->
  <div class="topbar">
    <!-- Optional: <a href="../index.html" class="icon-btn back-btn" title="Back">←</a> -->
    <div class="topbar-title">Quiz Hub</div>
    <button class="icon-btn btn-tracker" onclick="openTrackerDashboard()" title="Question Tracker">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 5-9"/></svg>
      <span class="tracker-badge" id="tracker-badge-count"></span>
    </button>
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>

  <div class="container">
    <!-- HERO SECTION -->
    <header class="hero">
      <h1>Select Your <span>Exam</span></h1>
      <p>Test your knowledge across various subjects. Choose an exam below to begin.</p>
    </header>

    <!-- QUIZ GRID -->
    <div class="quiz-grid" id="quiz-grid"></div>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────
   QUIZ CONFIGURATION — Easily add your quizzes here!
──────────────────────────────────────────────────────────────────*/
const QUIZZES = [
  {
    title: "📝 Example Quiz",
    description: "This is an example quiz. Replace with your own!",
    icon: "📝",
    tags: ["Example", "Demo"],
    url: "quiz.html"
  }
];
</script>


<script src="index-engine.js"></script>
<script>
(function(){var s=localStorage.getItem('quiz-theme');if(s)document.documentElement.setAttribute('data-theme',s);if(window.__updateThemeIcon)window.__updateThemeIcon();if(window.renderQuizzes)window.renderQuizzes();})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>

</body>
</html>
