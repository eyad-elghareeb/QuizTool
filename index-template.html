<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub</title>
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES & THEME (Matching QuizTool)
═══════════════════════════════════════════ */
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --accent:     #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg:         #f3f0eb;
  --surface:    #ffffff;
  --surface2:   #f8f6f1;
  --border:     #d0ccc5;
  --text:       #1c1917;
  --text-muted: #78716c;
  --accent:     #c27803;
  --accent-dim: rgba(194,120,3,0.10);
  --shadow:     0 4px 24px rgba(0,0,0,0.10);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  display: flex;
  flex-direction: column;
}
button, a { cursor: pointer; font-family: inherit; border: none; outline: none; text-decoration: none; }

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  flex: 1;
  color: var(--text);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all var(--transition);
  font-size: 1.1rem;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }

/* ═══════════════════════════════════════════
   MAIN LAYOUT & HERO
═══════════════════════════════════════════ */
.container {
  flex: 1;
  overflow-y: auto;
  padding: 3rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  text-align: center;
  max-width: 600px;
  margin-bottom: 3.5rem;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  line-height: 1.1;
  margin-bottom: 1rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--text-muted);
  font-size: 1.05rem;
}

/* ═══════════════════════════════════════════
   QUIZ GRID & CARDS
═══════════════════════════════════════════ */
.quiz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
  width: 100%;
  max-width: 1100px;
}
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease, border-color 0.3s ease;
}
.quiz-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}
.card-icon {
  width: 56px; height: 56px;
  background: var(--accent-dim);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 1.25rem;
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.card-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
  flex: 1; /* Pushes button to bottom */
}
.card-meta {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.meta-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 0.35rem 0.75rem;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-take-quiz {
  display: inline-block;
  text-align: center;
  width: 100%;
  padding: 0.85rem;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 0.95rem;
  transition: opacity var(--transition), transform var(--transition);
}
.btn-take-quiz:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-take-quiz:active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .container { padding: 2rem 1rem; }
  .quiz-grid { grid-template-columns: 1fr; }
  .hero { margin-bottom: 2rem; }
}
</style>
</head>
<body>

  <!-- TOP NAVIGATION -->
  <div class="topbar">
    <div class="topbar-title">Quiz Hub</div>
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>

  <div class="container">
    <!-- HERO SECTION -->
    <header class="hero">
      <h1>Select Your <span>Exam</span></h1>
      <p>Test your knowledge across various subjects. Choose an exam below to begin.</p>
    </header>

    <!-- QUIZ GRID -->
    <div class="quiz-grid" id="quiz-grid">
      <!-- Cards are generated here via JavaScript -->
    </div>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────
   QUIZ CONFIGURATION — Easily add your quizzes here!
──────────────────────────────────────────────────────────────────*/
const QUIZZES = [
  {
    title: "📝 Example Quiz",
    description: "This is an example quiz. Replace with your own!",
    icon: "📝",
    tags: ["Example", "Demo"],
    url: "quiz.html"
  }
  // To add a new quiz, duplicate a block above, change the text, and link the file!
];

/* ─────────────────────────────────────────────────────────────────
   ENGINE LOGIC
──────────────────────────────────────────────────────────────────*/

// 1. Render the Quiz Cards dynamically
function renderQuizzes() {
  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = QUIZZES.map(quiz => `
    <div class="quiz-card">
      <div class="card-icon">${quiz.icon}</div>
      <h2 class="card-title">${quiz.title}</h2>
      <p class="card-desc">${quiz.description}</p>
      <div class="card-meta">
        ${quiz.tags.map(tag => `<span class="meta-badge">${tag}</span>`).join('')}
      </div>
      <a href="${quiz.url}" class="btn-take-quiz">Start →</a>
    </div>
  `).join('');
}

// 2. Handle Theme Toggle
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';

  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('quiz-theme', newTheme);
  updateThemeIcon();
}

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-toggle').textContent = isDark ? '☀' : '☾';
}

// 3. Initialize on page load
function init() {
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }

  updateThemeIcon();
  renderQuizzes();
}

init();
</script>
</body>
</html>
