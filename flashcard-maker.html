<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Maker — QuizTool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --accent:     #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --correct:    #2ea043;
  --correct-bg: rgba(46,160,67,0.12);
  --wrong:      #da3633;
  --wrong-bg:   rgba(218,54,51,0.12);
  --flagged:    #58a6ff;
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg:         #f3f0eb;
  --surface:    #ffffff;
  --surface2:   #f8f6f1;
  --border:     #d0ccc5;
  --text:       #1c1917;
  --text-muted: #78716c;
  --accent:     #c27803;
  --accent-dim: rgba(194,120,3,0.10);
  --correct:    #16a34a;
  --correct-bg: rgba(22,163,74,0.10);
  --wrong:      #dc2626;
  --wrong-bg:   rgba(220,38,38,0.10);
  --shadow:     0 4px 24px rgba(0,0,0,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
}
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
.topbar {
  display: flex; align-items: center;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; flex: 1; }
.back-btn { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color var(--transition); }
.back-btn:hover { color: var(--text); }
.icon-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all var(--transition); font-size: 1rem; cursor: pointer; }
.icon-btn:hover { color: var(--text); border-color: var(--accent); }
h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 2rem; text-align: center; }
.form-group { margin-bottom: 1.5rem; }
label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text); }
input, textarea { width: 100%; padding: 0.85rem 1rem; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 1rem; transition: all var(--transition); }
input:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; }
select { width: 100%; padding: 0.85rem 1rem; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 1rem; cursor: pointer; }
select:focus { outline: none; border-color: var(--accent); }
.card-entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
}
.card-number {
  position: absolute; top: -12px; left: 1rem;
  background: var(--accent); color: #000;
  font-weight: 700; padding: 0.2rem 0.75rem;
  border-radius: 6px; font-size: 0.8rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.card-type-badge {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  background: rgba(0,0,0,0.2);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.delete-btn {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong);
  color: var(--wrong);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.8rem;
}
.delete-btn:hover { background: var(--wrong); color: #fff; }
.btn-add {
  width: 100%; padding: 1rem;
  border: 2px dashed var(--border);
  background: transparent;
  color: var(--text-muted);
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  transition: all var(--transition);
  margin-bottom: 2rem;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); }
.btn-generate {
  width: 100%; padding: 1rem;
  border-radius: var(--radius);
  background: var(--accent); color: #000;
  font-weight: 700; font-size: 1rem;
  border: none; cursor: pointer;
  transition: opacity var(--transition);
}
.btn-generate:hover { opacity: 0.88; }
.output-area {
  margin-top: 2rem;
  padding: 1.5rem;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.output-area pre {
  max-height: 300px;
  overflow: auto;
  padding: 1rem;
  background: var(--surface2);
  border-radius: 8px;
  font-family: monospace;
  font-size: 0.85rem;
  white-space: pre-wrap;
}
.type-selector {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.type-btn {
  flex: 1;
  padding: 0.5rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.type-btn:hover { border-color: var(--accent); color: var(--accent); }
.type-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.tags-input { font-size: 0.85rem; }
.hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.35rem; }
.collapse-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0.2rem 0.5rem;
}
@media (max-width: 768px) { .container { padding: 1.5rem 1rem; } }
</style>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="favicon.svg">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</head>
<body>

<div class="topbar">
  <a href="#" onclick="navigateToIndex(event)" class="back-btn">← Back to Hub</a>
  <div class="topbar-title">🃏 Flashcard Maker</div>
  <button class="icon-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">☀</button>
  <button class="icon-btn" onclick="resetForm()" title="Reset Form">↻</button>
</div>

<div class="container">
  <h1>Create Flashcard Deck</h1>

  <div class="form-group">
    <label>Deck Title</label>
    <input type="text" id="deck-title" placeholder="Enter deck name..." value="My Flashcard Deck">
  </div>

  <div class="form-group">
    <label>Deck Description</label>
    <textarea id="deck-description" rows="2" placeholder="Short description about this deck...">Study and memorize with flashcards.</textarea>
  </div>

  <div class="form-group">
    <label>Deck Icon (emoji)</label>
    <input type="text" id="deck-icon" placeholder="e.g., 🃏" value="🃏" style="max-width: 100px;">
  </div>

  <div id="cards-container">
    <!-- Cards will be added here -->
  </div>

  <button class="btn-add" onclick="addCard()">+ Add Card</button>

  <button class="btn-generate" onclick="generateDeck()">📥 Generate Flashcard Deck File</button>

  <div class="output-area" id="output-area" style="display: none;">
    <h3 style="margin-bottom: 1rem;">✅ Generated Deck Code:</h3>
    <pre id="output-code"></pre>
    <button class="btn-generate" style="margin-top: 1rem;" onclick="downloadDeck()">💾 Download as HTML File</button>
  </div>
</div>

<script>
let cardCount = 0;

function init() {
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon();
  addCard();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('quiz-theme', newTheme);
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '☾';
}

function getCardType(id) {
  const el = document.querySelector(`#card-${id} .card-type-select`);
  return el ? el.value : 'basic';
}

function addCard() {
  cardCount++;
  const container = document.getElementById('cards-container');
  const card = document.createElement('div');
  card.className = 'card-entry';
  card.id = `card-${cardCount}`;
  card.innerHTML = `
    <span class="card-number">
      Card ${cardCount}
      <select class="card-type-select" onchange="onCardTypeChange(${cardCount})" style="font-size:0.7rem;padding:2px 6px;width:auto;background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:inherit;">
        <option value="basic">Basic</option>
        <option value="cloze">Cloze</option>
      </select>
    </span>
    <div class="card-header">
      <span style="color:var(--text-muted);font-size:0.85rem;">Enter card details below</span>
      <button class="delete-btn" onclick="deleteCard(${cardCount})">✕ Delete</button>
    </div>

    <div class="card-fields-basic" id="fields-basic-${cardCount}">
      <div class="form-group">
        <label>Front (question / term)</label>
        <textarea id="card-${cardCount}-front" rows="3" placeholder="Enter the question or term on the front of the card..."></textarea>
      </div>
      <div class="form-group">
        <label>Back (answer / definition)</label>
        <textarea id="card-${cardCount}-back" rows="3" placeholder="Enter the answer or definition on the back of the card..."></textarea>
      </div>
    </div>

    <div class="card-fields-cloze" id="fields-cloze-${cardCount}" style="display:none;">
      <div class="form-group">
        <label>Cloze Text</label>
        <textarea id="card-${cardCount}-cloze" rows="4" placeholder="Use {{c1::answer}} for cloze deletions. E.g.: The {{c1::mitochondria}} is the {{c2::powerhouse}} of the cell."></textarea>
        <div class="hint">Use {{c1::answer}}, {{c2::answer}} etc. Each <code>cN</code> becomes a separate revealable blank.</div>
      </div>
    </div>

    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" class="tags-input" id="card-${cardCount}-tags" placeholder="e.g., biology, anatomy" value="">
    </div>
  `;
  container.appendChild(card);
}

function onCardTypeChange(id) {
  const type = document.querySelector(`#card-${id} .card-type-select`).value;
  document.getElementById(`fields-basic-${id}`).style.display = type === 'basic' ? 'block' : 'none';
  document.getElementById(`fields-cloze-${id}`).style.display = type === 'cloze' ? 'block' : 'none';
}

function deleteCard(id) {
  const el = document.getElementById(`card-${id}`);
  if (el) el.remove();
}

function generateDeck() {
  const title = document.getElementById('deck-title').value || 'Flashcard Deck';
  const description = document.getElementById('deck-description').value || '';
  const icon = document.getElementById('deck-icon').value || '🃏';

  const cards = [];
  document.querySelectorAll('.card-entry').forEach(entry => {
    const id = entry.id.replace('card-', '');
    const type = entry.querySelector('.card-type-select').value;

    if (type === 'basic') {
      const front = document.getElementById(`card-${id}-front`)?.value;
      const back = document.getElementById(`card-${id}-back`)?.value;
      if (!front && !back) return;
      const tagsStr = document.getElementById(`card-${id}-tags`)?.value || '';
      const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
      cards.push({
        type: 'basic',
        front: front || '',
        back: back || '',
        tags: tags,
        id: 'fc-' + Date.now().toString(36) + '-' + id
      });
    } else {
      const text = document.getElementById(`card-${id}-cloze`)?.value;
      if (!text) return;
      const tagsStr = document.getElementById(`card-${id}-tags`)?.value || '';
      const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
      cards.push({
        type: 'cloze',
        text: text,
        tags: tags,
        id: 'fc-' + Date.now().toString(36) + '-' + id
      });
    }
  });

  if (cards.length === 0) {
    alert('Please add at least one card!');
    return;
  }

  const output = {
    config: {
      uid: Date.now().toString(36) + Math.random().toString(36).substr(2, 9),
      title: title,
      description: description,
      icon: icon
    },
    cards: cards
  };

  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-code').textContent = JSON.stringify(output, null, 2);
  window.generatedDeck = output;
}

function downloadDeck() {
  if (!window.generatedDeck) return;

  fetch('flashcard-template.html')
    .then(res => {
      if (!res.ok) throw new Error('Could not find flashcard-template.html (Status: ' + res.status + ')');
      return res.text();
    })
    .then(template => {
      const configJson = 'const BANK_CONFIG = ' + JSON.stringify(window.generatedDeck.config, null, 2) + ';';
      const cardsJson = 'const FLASHCARD_BANK = ' + JSON.stringify(window.generatedDeck.cards, null, 2) + ';';

      let modified = template;

      const cfgStart = '/* [FLASHCARD_CONFIG_START] */';
      const cfgEnd = '/* [FLASHCARD_CONFIG_END] */';
      const cfgI1 = modified.indexOf(cfgStart);
      const cfgI2 = modified.indexOf(cfgEnd);
      if (cfgI1 !== -1 && cfgI2 !== -1) {
        modified = modified.substring(0, cfgI1 + cfgStart.length) + '\n' + configJson + '\n' + modified.substring(cfgI2);
      }

      const bankStart = '/* [FLASHCARD_BANK_START] */';
      const bankEnd = '/* [FLASHCARD_BANK_END] */';
      const bankI1 = modified.indexOf(bankStart);
      const bankI2 = modified.indexOf(bankEnd);
      if (bankI1 !== -1 && bankI2 !== -1) {
        modified = modified.substring(0, bankI1 + bankStart.length) + '\n' + cardsJson + '\n' + modified.substring(bankI2);
      }

      modified = modified.replace(/<title>.*?<\/title>/, '<title>' + window.generatedDeck.config.title + '</title>');

      const blob = new Blob([modified], {type: 'text/html'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const safeName = window.generatedDeck.config.title
        .replace(/[^a-z0-9\s-]/gi, '')
        .trim()
        .replace(/\s+/g, '-')
        .toLowerCase();
      a.download = (safeName || 'flashcard-deck') + '.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 100);
      showToast('✅ Deck generated and download started!');
    })
    .catch(function(err) {
      console.error(err);
      alert('Error generating deck file: ' + err.message + '\n\nEnsure flashcard-template.html is in the same folder.');
    });
}

function resetForm() {
  if (confirm('Are you sure you want to reset the form? All entered data will be lost.')) {
    cardCount = 0;
    document.getElementById('deck-title').value = 'My Flashcard Deck';
    document.getElementById('deck-description').value = 'Study and memorize with flashcards.';
    document.getElementById('deck-icon').value = '🃏';
    document.getElementById('cards-container').innerHTML = '';
    document.getElementById('output-area').style.display = 'none';
    document.getElementById('output-code').textContent = '';
    window.generatedDeck = null;
    addCard();
    showToast('Form reset!');
  }
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:0.75rem 1.5rem;border-radius:var(--radius);color:var(--text);font-weight:500;box-shadow:var(--shadow);z-index:9999;transition:opacity 0.3s ease;';
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { toast.remove(); }, 300);
  }, 2200);
}

function navigateToIndex(event) {
  event.preventDefault();
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
