    async function handleSourceNext() {
      window.clearTimeout(pasteImportTimer);
      const mode = document.getElementById('file-source-mode')?.value;
      const raw = document.getElementById('file-import-raw')?.value || '';
      const shouldImport = (mode === 'json' || mode === 'text') && raw.trim();

      // Navigation should never depend on parser success. Move first, then import.
      setModalTab('questions');

      if (!shouldImport) return;

      state.wizard = { ...(state.wizard || {}), sourceMode: mode, sourceRaw: raw };

      let imported = false;
      if ((mode === 'json' || mode === 'text') && raw.trim()) {
        try {
          imported = await applyWizardImport(raw);
        } catch (err) {
          showToast('Could not parse questions from source content. You can edit them manually on the Builder tab.', 'warn');
          return;
        }
      }

      if (imported) {
        renderNewFileModal();
      } else {
        showToast('Could not parse questions from source content. You can edit them manually on the Builder tab.', 'warn');
      }
    }

    function setModalTab(tab) {
      if (state.modalTab === 'questions') syncModalQuestionsFromUI();
      state.wizard = collectWizardState();
      state.modalTab = tab;
      renderNewFileModal();
    }

    function onFileTypeChange() {
      const type = document.getElementById('file-type').value;
      const wrap = document.getElementById('bank-icon-wrap');
      const isIconType = type === 'bank' || type === 'flashcard' || type === 'written' || type === 'osce';
      if (wrap) wrap.style.display = isIconType ? 'grid' : 'none';
      const iconInput = document.getElementById('file-icon');
      if (iconInput) {
        const cur = iconInput.value;
        if (type === 'flashcard' && (!cur || cur === '🗃️' || cur === '✍️' || cur === '🩺')) iconInput.value = '🃏';
        else if (type === 'written' && (!cur || cur === '🗃️' || cur === '🃏' || cur === '🩺')) iconInput.value = '✍️';
        else if (type === 'osce' && (!cur || cur === '🗃️' || cur === '🃏' || cur === '✍️')) iconInput.value = '🩺';
        else if (type !== 'flashcard' && type !== 'written' && type !== 'osce' && (!cur || cur === '🃏' || cur === '✍️' || cur === '🩺')) iconInput.value = '🗃️';
      }
    }

    function renderModalQuestionList() {
      if (!state.modalQuestions.length) return '<div class="muted" style="padding:1rem;">No questions added yet.</div>';
      const isFlashcard = state.wizard?.type === 'flashcard';
      const isWritten = state.wizard?.type === 'written';
      const isOsce = state.wizard?.type === 'osce';
      return state.modalQuestions.map((q, i) => {
        if (isOsce) {
          const patient = q.patient || {};
          const hp = q.hiddenProfile || {};
          const rubric = q.rubric || {};
          return `
            <div class="editor-card" style="margin-bottom: 0.5rem; padding: 0.75rem; background: var(--surface2); border: 1px solid var(--border);">
              <div class="editor-card-header" style="margin-bottom: 0.5rem;">
                 <div class="editor-card-title">OSCE Case ${i + 1}</div>
                 <button class="mini-btn delete" onclick="removeModalQuestion(${i})">Remove Case</button>
              </div>
              <div class="field-grid" style="margin-bottom:0.5rem;">
                <div class="field"><input class="text-input mq-q" data-idx="${i}" value="${escapeHtml(q.title || '')}" placeholder="Case title" style="font-weight:600;"></div>
                <div class="field"><input class="text-input mq-specialty" data-idx="${i}" value="${escapeHtml(q.specialty || '')}" placeholder="Specialty"></div>
              </div>
              <div style="border:1px solid var(--border); border-radius:6px; padding:0.5rem; background:var(--surface); margin-bottom:0.5rem;">
                <div style="font-weight:700; font-size:0.8rem; color:var(--accent); margin-bottom:0.3rem;">Patient: <input class="text-input mq-patient-name" data-idx="${i}" value="${escapeHtml(patient.name || '')}" placeholder="Name" style="width:auto; display:inline; max-width:200px;"></div>
                <input class="text-input mq-patient-opening" data-idx="${i}" value="${escapeHtml(patient.opening || '')}" placeholder="Opening line" style="margin-bottom:0.25rem;">
              </div>
            </div>`;
        }
        return `
        <div class="editor-card" style="margin-bottom: 0.5rem; padding: 0.75rem; background: var(--surface2); border: 1px solid var(--border);">
          <div class="editor-card-header" style="margin-bottom: 0.5rem;">
             <div class="editor-card-title">${isFlashcard ? 'C' : isWritten ? 'W' : 'Q'}${i + 1}</div>
             <button class="mini-btn delete" onclick="removeModalQuestion(${i})">Remove ${isFlashcard ? 'Card' : isWritten ? 'Q' : 'Q'}</button>
          </div>
          <input class="text-input mq-q" data-idx="${i}" value="${escapeHtml(q.question)}" placeholder="${isFlashcard ? 'Front text' : isWritten ? 'Written question text' : 'Question text'}" style="margin-bottom:0.5rem;">
          ${isWritten ? `
          <textarea class="text-area mq-model-answer" data-idx="${i}" placeholder="Model answer (required for AI grading)" style="min-height:80px; margin-bottom:0.5rem;">${escapeHtml(q.modelAnswer || '')}</textarea>
          <input class="text-input mq-rubric" data-idx="${i}" value="${escapeHtml(q.rubric || '')}" placeholder="Rubric (optional grading guidance)" style="margin-bottom:0.5rem;" oninput="syncModalQuestionsFromUI()">
          <textarea class="text-area mq-exp" data-idx="${i}" placeholder="Explanation (optional)" style="min-height:60px; margin-bottom:0.5rem;">${escapeHtml(q.explanation || '')}</textarea>
          <input class="text-input mq-tags" data-idx="${i}" value="${escapeHtml((q.tags || []).join(', '))}" placeholder="Tags (comma-separated)" style="margin-bottom:0.5rem;" oninput="syncModalQuestionsFromUI()">
          ${(Array.isArray(q.children) ? q.children : []).map((child, ci) => renderModalChildRow(child, i, ci, (q.children || []).length)).join('')}
          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.25rem;">
            <button type="button" class="mini-btn" onclick="addModalChildPart(${i})" style="border-style:dashed;">+ Add Part</button>
            ${(Array.isArray(q.children) && q.children.length) ? `<button type="button" class="mini-btn" onclick="convertModalToSingle(${i})">Convert to Single</button>` : `<button type="button" class="mini-btn" onclick="convertModalToMulti(${i})">Convert to Multi-part</button>`}
          </div>
          ` : isFlashcard ? `
          <textarea class="text-area mq-exp" data-idx="${i}" placeholder="Back text / answer" style="min-height:80px; margin-bottom:0.5rem;">${escapeHtml(q.explanation || '')}</textarea>
          ` : `
          <textarea class="text-area mq-exp" data-idx="${i}" placeholder="Explanation (optional)" style="min-height:80px; margin-bottom:0.5rem;">${escapeHtml(q.explanation || '')}</textarea>
          <div class="option-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            ${(q.options || []).map((opt, oi) => `
              <div class="option-row" style="padding: 0.25rem; display: flex; align-items: center; gap: 0.25rem;">
                <input type="radio" name="mq-correct-${i}" value="${oi}" ${q.correct === oi ? 'checked' : ''}>
                <input class="text-input mq-opt" data-idx="${i}" data-oidx="${oi}" value="${escapeHtml(opt)}" placeholder="Opt ${String.fromCharCode(65 + oi)}" style="flex:1;">
                ${q.options.length > 2 ? `<button class="mini-btn delete" onclick="removeModalOption(${i}, ${oi})" title="Remove Option">×</button>` : ''}
              </div>
            `).join('')}
            <button class="mini-btn" onclick="addModalOption(${i})" style="grid-column: span 2; border-style: dashed;">+ Add Option</button>
          </div>
          `}
        </div>
      `}).join('');
    }

    function syncModalQuestionsFromUI() {
      const isFlashcard = state.wizard?.type === 'flashcard';
      const isWritten = state.wizard?.type === 'written';
      const isOsce = state.wizard?.type === 'osce';
      const questions = [];
      const rows = document.querySelectorAll('#modal-question-list .editor-card');
      rows.forEach((row, i) => {
        if (isOsce) {
          const title = row.querySelector('.mq-q')?.value || '';
          const specialty = row.querySelector('.mq-specialty')?.value || '';
          const pName = row.querySelector('.mq-patient-name')?.value || '';
          const pOpening = row.querySelector('.mq-patient-opening')?.value || '';
          questions.push({
            id: 'case-' + String(i + 1).padStart(3, '0'),
            title,
            specialty,
            difficulty: 'Intermediate',
            patient: { name: pName, age: 0, gender: 'male', avatarSeed: '', opening: pOpening },
            hiddenProfile: { diagnosis: '', keySymptoms: [], redFlags: [], pastHistory: [], vitalSigns: '' },
            rubric: { mustAsk: [], bonus: [] },
          });
          return;
        }
        const question = row.querySelector('.mq-q').value;
        const explanation = row.querySelector('.mq-exp')?.value || '';
        if (isWritten) {
          const modelAnswer = row.querySelector('.mq-model-answer')?.value || '';
          const rubric = row.querySelector('.mq-rubric')?.value || '';
          const tagsStr = row.querySelector('.mq-tags')?.value || '';
          const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
          const entry = { question, modelAnswer, rubric, explanation, tags };
          const childRows = Array.from(row.querySelectorAll('.modal-child-row'));
          if (childRows.length) {
            entry.children = childRows.map((cr) => {
              const label = cr.querySelector('.mq-child-label')?.value?.trim() || '';
              const cQ = cr.querySelector('.mq-child-question')?.value || '';
              const cM = cr.querySelector('.mq-child-model-answer')?.value || '';
              const cR = cr.querySelector('.mq-child-rubric')?.value || '';
              const cE = cr.querySelector('.mq-child-explanation')?.value || '';
              const child = { label, question: cQ, modelAnswer: cM };
              if (cR) child.rubric = cR;
              if (cE) child.explanation = cE;
              return child;
            });
          }
          questions.push(entry);
        } else {
          const opts = Array.from(row.querySelectorAll('.mq-opt')).map(input => input.value);
          const options = isFlashcard ? [] : opts;
          const correct = isFlashcard ? 0 : (parseInt(row.querySelector(`input[name="mq-correct-${i}"]:checked`)?.value || '0'));
          questions.push({ question, options, correct, explanation });
        }
      });
      if (questions.length) state.modalQuestions = questions;
    }

    function addModalQuestion() {
      syncModalQuestionsFromUI();
      const isFlashcard = state.wizard?.type === 'flashcard';
      const isWritten = state.wizard?.type === 'written';
      const isOsce = state.wizard?.type === 'osce';
      state.modalQuestions.push(isWritten
        ? { id: 'wq-' + Date.now().toString(36) + '-' + (state.modalQuestions.length + 1), question: '', modelAnswer: '', rubric: '', explanation: '', tags: [] }
        : isOsce
          ? { id: 'case-' + String(state.modalQuestions.length + 1).padStart(3, '0'), title: '', specialty: '', difficulty: 'Intermediate', patient: { name: '', age: 0, gender: 'male', avatarSeed: '', opening: '' }, hiddenProfile: { diagnosis: '', keySymptoms: [], redFlags: [], pastHistory: [], vitalSigns: '' }, rubric: { mustAsk: [], bonus: [] } }
          : { question: '', options: isFlashcard ? [] : ['', '', '', ''], correct: 0, explanation: '' }
      );
      renderNewFileModal();
    }

    function removeModalQuestion(index) {
      syncModalQuestionsFromUI();
      state.modalQuestions.splice(index, 1);
      renderNewFileModal();
    }

    function addModalOption(qIdx) {
      syncModalQuestionsFromUI();
      state.modalQuestions[qIdx].options.push('');
      renderNewFileModal();
    }

    function removeModalOption(qIdx, oIdx) {
      syncModalQuestionsFromUI();
      state.modalQuestions[qIdx].options.splice(oIdx, 1);
      if (state.modalQuestions[qIdx].correct >= state.modalQuestions[qIdx].options.length) {
        state.modalQuestions[qIdx].correct = 0;
      }
      renderNewFileModal();
    }

    // ── Wizard (new-file) written multi-part helpers ────────────────────────
    function renderModalChildRow(child, qIdx, cIdx, total) {
      const label = child.label || childLetter(cIdx);
      return `
        <div class="modal-child-row" data-cidx="${cIdx}" style="border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.6rem; background:var(--surface); margin-top:0.4rem;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:0.4rem; margin-bottom:0.35rem;">
            <div style="font-weight:700; font-size:0.78rem; color:var(--accent);">Part ${escapeHtml(label)}</div>
            <div class="mini-actions">
              <button type="button" class="mini-btn" onclick="moveModalChildPart(${qIdx}, ${cIdx}, -1)" ${cIdx === 0 ? 'disabled' : ''}>↑</button>
              <button type="button" class="mini-btn" onclick="moveModalChildPart(${qIdx}, ${cIdx}, 1)" ${cIdx === total - 1 ? 'disabled' : ''}>↓</button>
              <button type="button" class="mini-btn delete" onclick="removeModalChildPart(${qIdx}, ${cIdx})">Remove</button>
            </div>
          </div>
          <input class="text-input mq-child-label" value="${escapeHtml(child.label || childLetter(cIdx))}" placeholder="A)" style="max-width:100px; margin-bottom:0.3rem;" oninput="syncModalQuestionsFromUI()">
          <textarea class="text-area mq-child-question" placeholder="Part question" style="min-height:50px; margin-bottom:0.3rem;" oninput="syncModalQuestionsFromUI()">${escapeHtml(child.question || '')}</textarea>
          <textarea class="text-area mq-child-model-answer" placeholder="Model answer for this part (optional)" style="min-height:60px; margin-bottom:0.3rem;" oninput="syncModalQuestionsFromUI()">${escapeHtml(child.modelAnswer || '')}</textarea>
          <input class="text-input mq-child-rubric" value="${escapeHtml(child.rubric || '')}" placeholder="Rubric (optional)" style="margin-bottom:0.3rem;" oninput="syncModalQuestionsFromUI()">
          <textarea class="text-area mq-child-explanation" placeholder="Explanation (optional)" style="min-height:40px;" oninput="syncModalQuestionsFromUI()">${escapeHtml(child.explanation || '')}</textarea>
        </div>
      `;
    }

    function _ensureModalChildren(qIdx) {
      const q = state.modalQuestions[qIdx];
      if (!q) return null;
      if (!Array.isArray(q.children)) q.children = [];
      return q;
    }

    function addModalChildPart(qIdx) {
      syncModalQuestionsFromUI();
      const q = _ensureModalChildren(qIdx);
      if (!q) return;
      q.children.push({ label: childLetter(q.children.length), question: '', modelAnswer: '', rubric: '', explanation: '' });
      renderNewFileModal();
    }

    function removeModalChildPart(qIdx, cIdx) {
      syncModalQuestionsFromUI();
      const q = _ensureModalChildren(qIdx);
      if (!q || !q.children[cIdx]) return;
      q.children.splice(cIdx, 1);
      q.children.forEach((child, ci) => {
        const def = childLetter(ci);
        if (/^[A-Z]\)$/.test(child.label || '') || !child.label) child.label = def;
      });
      renderNewFileModal();
    }

    function moveModalChildPart(qIdx, cIdx, delta) {
      syncModalQuestionsFromUI();
      const q = _ensureModalChildren(qIdx);
      if (!q || !q.children[cIdx]) return;
      const next = cIdx + delta;
      if (next < 0 || next >= q.children.length) return;
      const tmp = q.children[cIdx];
      q.children[cIdx] = q.children[next];
      q.children[next] = tmp;
      renderNewFileModal();
    }

    function convertModalToMulti(qIdx) {
      syncModalQuestionsFromUI();
      const q = _ensureModalChildren(qIdx);
      if (!q || q.children.length) return;
      q.children.push({ label: 'A)', question: '', modelAnswer: '', rubric: '', explanation: '' });
      renderNewFileModal();
    }

    function convertModalToSingle(qIdx) {
      syncModalQuestionsFromUI();
      const q = state.modalQuestions[qIdx];
      if (!q || !Array.isArray(q.children) || !q.children.length) return;
      openModal({
        title: 'Convert to Single Question?',
        subtitle: 'This removes the sub-parts. The parent prompt and Model Answer are kept.',
        body: `
          <div class="empty-state" style="text-align:left;">
            ${q.children.length} sub-part${q.children.length === 1 ? '' : 's'} will be deleted.
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="background:var(--bad);border-color:var(--bad);color:#fff;" onclick="closeModal(); _confirmModalConvertToSingle(${qIdx})">Remove Parts</button>
          </div>
        `,
      });
    }

    function _confirmModalConvertToSingle(qIdx) {
      const q = state.modalQuestions[qIdx];
      if (!q) return;
      delete q.children;
      renderNewFileModal();
    }
    window.renderModalChildRow = renderModalChildRow;
    window.addModalChildPart = addModalChildPart;
    window.removeModalChildPart = removeModalChildPart;
    window.moveModalChildPart = moveModalChildPart;
    window.convertModalToMulti = convertModalToMulti;
    window.convertModalToSingle = convertModalToSingle;
    window._confirmModalConvertToSingle = _confirmModalConvertToSingle;

    let pasteImportTimer = null;
    let _suppressPasteImport = false;
    function onPasteInputChange() {
      if (_suppressPasteImport) return;
      const raw = document.getElementById('file-import-raw')?.value || '';
      syncWizardSummary();
      window.clearTimeout(pasteImportTimer);
      if (raw.trim()) {
        pasteImportTimer = window.setTimeout(async () => {
          const mode = document.getElementById('file-source-mode')?.value;
          if (mode === 'json' || mode === 'text') {
            const imported = await applyWizardImport();
            if (imported) setModalTab('questions');
          }
        }, 800);
      }
    }

    function onModalJsonDrop(e) {
      e.preventDefault();
      const textarea = document.getElementById('file-import-raw');
      if (!textarea) return;
      textarea.classList.remove('dragover');
      const file = e.dataTransfer?.files?.[0];
      if (!file) return;

      // Only accept .json files
      if (!/\.json$/i.test(file.name || '')) {
        showToast('Only .json files can be dropped here.', 'warn');
        return;
      }

      // Force JSON source mode
      const modeSelect = document.getElementById('file-source-mode');
      if (modeSelect && modeSelect.value !== 'json') modeSelect.value = 'json';
      if (state.wizard) state.wizard.sourceMode = 'json';

      // Clear any pending paste import timer to avoid double-import
      window.clearTimeout(pasteImportTimer);
      // Suppress oninput-triggered import since we import immediately below
      _suppressPasteImport = true;

      const reader = new FileReader();
      reader.onload = async (event) => {
        const content = event.target.result;
        // Set textarea value without triggering oninput (which would re-import)
        textarea.value = content;
        _suppressPasteImport = false;
        if (state.wizard) state.wizard.sourceRaw = content;
        syncWizardSummary();
        const imported = await applyWizardImport();
        if (imported) setModalTab('questions');
      };
      reader.readAsText(file);
    }

    /**
     * Handler for the "Browse .json File" button's file input.
     * Uses the native <input type="file"> which works reliably in all
     * Tauri webviews (unlike OS-level drag-and-drop which may be blocked).
     */
    function onJsonFileSelected(e) {
      const file = e.target.files?.[0];
      if (!file) return;

      const textarea = document.getElementById('file-import-raw');

    /**

     */
    function importJsonContent(content, fileName) {
      const textarea = document.getElementById('file-import-raw');
      if (!textarea) return;

      const modeSelect = document.getElementById('file-source-mode');

    /**
     * Listen for Tauri-native drag-drop events.
     * When dragDropEnabled is true in tauri.conf.json, Tauri intercepts OS file drops
     * and emits 'tauri://drag-drop' events with file paths instead of passing them to
     * the webview's ondrop handler. We read the file via a Tauri command.
     */
    function initTauriDragDrop() {
      if (typeof window !== 'undefined' && window.__TAURI__ && window.__TAURI__.event) {
        try {
          window.__TAURI__.event.listen('tauri://drag-drop', async (event) => {
            const paths = event.payload?.paths;
            if (!paths || !paths.length) return;

            const filePath = paths[0];
            if (!/\.json$/i.test(filePath || '')) {
              showToast('Only .json files can be dropped.', 'warn');
              return;
            }

            try {
              const result = await window.__TAURI__.core.invoke('read_external_file', { path: filePath });
              if (result && result.content) {
                importJsonContent(result.content, result.name || filePath);
              }
            } catch (err) {
              showToast('Failed to read dropped file: ' + (err.message || err), 'error');
            }
          });
        } catch (_) {
          // Tauri event API not available — file picker button still works
        }
      }
    }

    async function applyWizardImport(rawOverride = null) {
      const raw = rawOverride ?? document.getElementById('file-import-raw')?.value ?? '';
      let parsed = parseImportedQuestions(raw);
      // If client-side parsing failed, try server-side fallback via Tauri command
      if (!parsed.questions.length && window.__TAURI__) {
        try {
          const serverResult = await window.__TAURI__.core.invoke('parse_json_questions', { content: raw });
          if (serverResult && serverResult.questions && serverResult.questions.length > 0) {
            parsed = { questions: normalizeQuestionList(serverResult.questions), issues: serverResult.issues || [] };
          }
        } catch (_) {
          // Server-side parse also failed — fall through to error
        }
      }
      if (!parsed.questions.length) {
        showToast('No questions could be parsed from the content. Check the format and try again.', 'error');
        return false;
      }
      state.modalQuestions = parsed.questions.map(question => ({
        question: question.question || '',
        options: question.options || ['', '', '', ''],
        correct: Number(question.correct || 0),
        explanation: question.explanation || '',
      }));
      if (parsed.issues.length) showToast(`Imported ${state.modalQuestions.length} questions with ${parsed.issues.length} warning(s).`, 'warn');
      else showToast(`Imported ${state.modalQuestions.length} questions.`, 'success');
      // NOTE: Do NOT auto-switch tabs or re-render here.
      // The caller (handleSourceNext / onJsonFileSelected / etc.) is responsible
      // for switching to the Builder tab. Auto-switching caused a double-render
      // bug where syncModalQuestionsFromUI() would read from a stale DOM.
      return true;
    }

    async function applyCloneSource() {
      const sourcePath = document.getElementById('file-clone-path')?.value || '';
      if (!sourcePath) {
        showToast('Choose a source quiz or bank first.', 'warn');
        return;
      }
      const payload = await fetchJson(`/admin/load-file?path=${encodeURIComponent(sourcePath)}`);
      const srcType = payload.meta?.type;
      if (srcType === 'osce') {
        // Preserve OSCE case structure as-is
        state.modalQuestions = clone(payload.meta?.questions || []);
      } else {
        state.modalQuestions = clone(payload.meta?.questions || []).map(question => ({
          question: question.question || question.front || '',
          options: question.options || ['', '', '', ''],
          correct: Number(question.correct || 0),
          explanation: question.explanation || question.back || '',
        }));
      }
      showToast(`Loaded ${state.modalQuestions.length} questions from ${sourcePath}.`, 'success');
      setModalTab('questions');
    }

    async function applyCombineSource() {
      const checkedBoxes = document.querySelectorAll('.combine-quiz-checkbox:checked');
      if (!checkedBoxes.length) {
        showToast('Choose at least one quiz or bank to combine.', 'warn');
        return;
      }
      
      const paths = Array.from(checkedBoxes).map(cb => cb.value);
      const shouldDedup = document.getElementById('combine-dedup')?.checked;
      
      let allQuestions = [];
      let totalFiles = paths.length;
      
      try {
        for (const path of paths) {
          const payload = await fetchJson(`/admin/load-file?path=${encodeURIComponent(path)}`);
          const questions = payload.meta?.questions || [];
          allQuestions = allQuestions.concat(questions);
        }
      } catch (err) {
        console.error(err);
        showToast('Error loading some files to combine.', 'error');
        return;
      }
      
      let standardized = allQuestions.map(q => ({
        question: q.question || q.front || '',
        options: q.options || ['', '', '', ''],
        correct: Number(q.correct || 0),
        explanation: q.explanation || q.back || '',
      }));
      
      let dupesCount = 0;
      if (shouldDedup) {
        const seen = new Set();
        const deduped = [];
        for (const q of standardized) {
          const key = q.question.trim().toLowerCase();
          if (seen.has(key)) {
            dupesCount++;
          } else {
            seen.add(key);
            deduped.push(q);
          }
        }
        standardized = deduped;
      }
      
      state.modalQuestions = standardized;
      setModalTab('questions');
      
      if (shouldDedup && dupesCount > 0) {
        showToast(`Combined ${standardized.length} questions from ${totalFiles} file(s) (removed ${dupesCount} duplicate(s)).`, 'success');
      } else {
        showToast(`Combined ${standardized.length} questions from ${totalFiles} file(s).`, 'success');
      }
    }

    async function createFile(mode = 'open') {
      syncModalQuestionsFromUI();
      const wizard = collectWizardState();
      const type = wizard.type;
      const folder = wizard.folder;
      const title = wizard.title;
      const description = wizard.description;
      const filename = wizard.filename;
      const icon = wizard.icon || (wizard.type === 'flashcard' ? '🃏' : wizard.type === 'written' ? '✍️' : '🗃️');
      const questions = state.modalQuestions;

      // Convert quiz-format questions to flashcard, written, or osce format when creating
      const payloadQuestions = type === 'flashcard'
        ? questions.map(q => ({
            type: 'basic',
            front: q.question || '',
            back: q.explanation || (q.options?.[q.correct] || ''),
            tags: [],
          }))
        : type === 'osce'
          ? questions.map(q => ({
              id: q.id || 'case-' + String(questions.indexOf(q) + 1).padStart(3, '0'),
              title: q.title || '',
              specialty: q.specialty || '',
              difficulty: q.difficulty || 'Intermediate',
              patient: q.patient || { name: '', age: 0, gender: 'male', avatarSeed: '', opening: '' },
              hiddenProfile: q.hiddenProfile || { diagnosis: '', keySymptoms: [], redFlags: [], pastHistory: [], vitalSigns: '' },
              rubric: q.rubric || { mustAsk: [], bonus: [] },
            }))
          : type === 'written'
            ? questions.map(q => ({
                id: q.id || 'wq-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 5),
                question: q.question || '',
                modelAnswer: q.modelAnswer || '',
                rubric: q.rubric || '',
                explanation: q.explanation || '',
                tags: Array.isArray(q.tags) ? q.tags : (typeof q.tags === 'string' ? q.tags.split(',').map(t => t.trim()).filter(Boolean) : []),
              }))
          : questions;

      if (!title) {
        showToast('Title is required.', 'warn');
        setModalTab('setup');
        return;
      }

      if (!questions.length) {
        showToast('Add at least one question before creating the file.', 'warn');
        setModalTab('questions');
        return;
      }

      if (validateQuestionListClient(questions).some(issue => issue.level === 'error')) {
        showToast('Fix the wizard validation issues before creating the file.', 'warn');
        setModalTab('questions');
        return;
      }

      let createdPath = '';
      try {
        const result = await fetchJson('/admin/create-file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, folder, title, description, filename, icon, questions: payloadQuestions }),
        });
        createdPath = result.path || '';
        showToast(result.message || 'File created.', 'success');
        logActivity('Created file', result.path || title, 'success');
        rememberRecent('recentFolders', folder);

        if (mode === 'open') closeModal();

        // Expand target folder before refresh so it shows up
        if (folder && folder !== '.') {
          const parts = folder.split('/');
          let current = '';
          for (const p of parts) {
            current = current ? `${current}/${p}` : p;
            state.openFolders.add(current);
          }
          saveUiPrefs();
        }

        scheduleSync();
        if (result.path) {
          if (mode === 'open') {
            await loadFile(result.path);
            setTimeout(() => {
              const activeRow = document.querySelector('.tree-row.active');
              if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
          } else {
            state.wizard = { ...wizard, title: '', filename: '', sourceRaw: '' };
            state.modalQuestions = [];
            renderNewFileModal();
            setModalTab('setup');
          }
        }
      } catch (err) {
        const message = createdPath
          ? `File was created, but refresh/open failed: ${err.message || 'Unknown error'}`
          : (err.message || 'Failed to create file.');
        showToast(message, 'error');
        logActivity(createdPath ? 'Open created file failed' : 'Create file failed', err.message || 'Unknown error', 'error');
      }
    }

    async function duplicateFile(sourcePath) {
      const folder = document.getElementById('duplicate-folder')?.value || '.';
      const filename = document.getElementById('duplicate-name')?.value || '';
      const result = await fetchJson('/admin/duplicate-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: sourcePath, folder, filename }),
      });
      closeModal();
      showToast(result.message || 'Duplicate created.', 'success');
      logActivity('Duplicated file', `${sourcePath}\n→ ${result.path}`, 'success');
      scheduleSync();
      if (result.path) await loadFile(result.path);
    }

    async function moveFile() {
      const folder = document.getElementById('move-folder').value;
      const filename = document.getElementById('move-name').value;
      const previous = state.currentFile;
      const result = await fetchJson('/admin/move-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: state.currentFile, folder, filename }),
      });
      closeModal();
      showToast(result.message || 'File moved.', 'success');
      logActivity('Moved file', `${previous}\n→ ${result.path}`, 'success');
      state.currentFile = result.path;
      scheduleSync();
      await loadFile(result.path, { keepTab: false });
    }

    async function deleteFile() {
      const deleted = state.currentFile;
      const result = await fetchJson('/admin/delete-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: state.currentFile }),
      });
      closeModal();
      showToast(result.message || 'File deleted.', 'success');
      logActivity('Deleted file', deleted, 'warn');
      state.currentFile = null;
      state.currentData = null;
      setDirty(false);
      scheduleSync();
      renderOverview();
    }

    async function executeDeleteFolder(folderPath) {
      const result = await fetchJson('/admin/delete-folder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: folderPath }),
      });
      showToast(result.message || 'Folder deleted.', 'success');
      logActivity('Deleted folder', folderPath + '\n' + (result.message || ''), 'warn');
      if (state.currentFile && state.currentFile.startsWith(folderPath + '/')) {
        state.currentFile = null;
        state.currentData = null;
        state.loadedMeta = null;
        state.validation = null;
        setDirty(false);
      }
      scheduleSync();
    }

    async function commitChanges() {
      const message = document.getElementById('commit-message').value;
      const result = await fetchJson('/admin/git-commit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      showToast(result.message || 'Commit created.', 'success');
      logActivity('Git commit', result.output || result.message || '', 'success');
      await refreshWorkspace({ preserveCurrent: true });
      closeModal();
    }

    async function pullChanges() {
      const result = await fetchJson('/admin/git-pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      showToast(result.message || 'Pull completed.', 'success');
      logActivity('Git pull', result.output || result.message || '', 'success');
      await refreshWorkspace({ preserveCurrent: true });
      closeModal();
    }

    async function pushChanges() {
      const result = await fetchJson('/admin/git-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      showToast(result.message || 'Push completed.', 'success');
      logActivity('Git push', result.output || result.message || '', 'success');
      await refreshWorkspace({ preserveCurrent: true });
      closeModal();
    }

    async function gitSync() {
      const message = document.getElementById('commit-message').value;
      if (!message) {
        showToast('Commit message is required for sync.', 'warn');
        return;
      }

      showToast('Starting Git Sync...', 'info');
      logActivity('Git Sync started', 'Pulling, committing, and pushing...', 'info');

      try {
        // 1. Pull
        const pullRes = await fetchJson('/admin/git-pull', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        logActivity('Git Pull result', pullRes.output || pullRes.message, 'success');

        // 2. Commit (also does git add -A)
        const commitRes = await fetchJson('/admin/git-commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        logActivity('Git Commit result', commitRes.output || commitRes.message, 'success');

        // 3. Push
        const pushRes = await fetchJson('/admin/git-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        logActivity('Git Push result', pushRes.output || pushRes.message, 'success');

        showToast('Git Sync completed!', 'success');
        await refreshWorkspace({ preserveCurrent: true });
        closeModal();
      } catch (err) {
        const msg = (err && (err.message || String(err))) || '';
        // Detect pull/rebase/merge failures (the typical sw.js divergence case)
        const isMergeConflict = /merge|conflict|rebase|fetch-first|non-fast-forward|stale|overwritten|local changes|would be overwritten/i.test(msg);
        showToast('Git Sync failed. Check activity log.', 'error');
        logActivity('Git Sync error', msg, 'error');
        if (isMergeConflict) {
          // Escape the failing git modal context and offer force-push as the recovery path
          openForcePushModal({ reason: msg });
        }
      }
    }

    function openForcePushModal({ reason = '' } = {}) {
      closeModal();
      openModal({
        title: 'Git Sync Conflict',
        subtitle: 'The local files (often sw.js after a sync) diverged from GitHub and the automatic rebase failed.',
        body: `
          <div class="empty-state" style="text-align:left;">
            Force-push overwrites the remote <strong>current branch</strong> with your local version using
            <code>--force-with-lease</code>. Remote commits not present locally will be lost. Use this when
            your local copy is the source of truth (the typical case after a sync regenerated sw.js locally).
            <br><br>
            <span class="muted" style="font-size:0.82rem;">If a collaborator pushed new commits after your last fetch, the lease check will reject this push to protect their work — pull first in that case.</span>
            ${reason ? `<details style="margin-top:0.75rem;"><summary style="cursor:pointer;color:var(--muted);font-size:.82rem;">Show git output</summary><pre style="white-space:pre-wrap;font-size:.78rem;margin-top:0.5rem;max-height:200px;overflow:auto;">${escapeHtml(reason)}</pre></details>` : ''}
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="background:var(--bad);border-color:var(--bad);color:#fff;" onclick="forcePush()">Force Push Local</button>
          </div>
        `,
      });
    }
    window.openForcePushModal = openForcePushModal;

    async function forcePush() {
      try {
        const result = await fetchJson('/admin/git-force-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        showToast(result.message || 'Force-push completed.', 'success');
        logActivity('Git force-push', result.output || result.message || ('branch: ' + (result.branch || '')), 'success');
        await refreshWorkspace({ preserveCurrent: true });
        closeModal();
      } catch (err) {
        const msg = (err && (err.message || String(err))) || 'Unknown error';
        showToast('Force-push failed: ' + msg, 'error');
        logActivity('Git force-push error', msg, 'error');
      }
    }
    window.forcePush = forcePush;

    function getQuickOpenResults(query = '') {
      const lowered = String(query || '').toLowerCase().trim();
      const list = lowered
        ? state.files.filter(file => [file.path, file.title, file.uid, file.description].join(' ').toLowerCase().includes(lowered))
        : [...state.files];
      return list.slice(0, 18);
    }

    function renderQuickOpenResults() {
      const host = document.getElementById('quick-open-results');
      if (!host) return;
      const query = document.getElementById('quick-open-input')?.value || '';
      state.quickOpenQuery = query;
      const rows = getQuickOpenResults(query);
      host.innerHTML = rows.length ? rows.map(file => `
        <button class="meta-card" style="text-align:left; cursor:pointer;" onclick="closeModal(); requestLoadFile('${escapeHtml(file.path)}')">
          <div class="meta-label">${escapeHtml(file.type)}</div>
          <div class="meta-value">${escapeHtml(file.title || file.name)}</div>
          <div class="muted" style="margin-top:0.35rem;">${escapeHtml(file.path)}</div>
        </button>
      `).join('') : '<div class="empty-state">No files match this search.</div>';
    }

    function openQuickOpenModal() {
      openModal({
        title: 'Quick Open',
        subtitle: 'Jump to a file by path, title, or UID.',
        body: `
          <div class="field">
            <label>Search</label>
            <input class="text-input" id="quick-open-input" value="${escapeHtml(state.quickOpenQuery || '')}" placeholder="Type to filter files..." oninput="renderQuickOpenResults()">
          </div>
          <div id="quick-open-results" style="display:grid; gap:0.65rem; margin-top:1rem; max-height:60vh; overflow:auto;"></div>
        `,
        onOpen: () => {
          document.getElementById('quick-open-input')?.focus();
          renderQuickOpenResults();
        },
      });
    }

    function setupKeyboard() {
      window.addEventListener('keydown', (event) => {
        const ctrl = event.ctrlKey || event.metaKey;
        const key = event.key;
        const tag = document.activeElement?.tagName?.toLowerCase();

        // Ctrl+S — Save
        if (ctrl && key.toLowerCase() === 's' && state.currentFile) {
          event.preventDefault();
          saveFile();
          return;
        }
        // Ctrl+K — Quick Open
        if (ctrl && key.toLowerCase() === 'k') {
          event.preventDefault();
          openQuickOpenModal();
          return;
        }
        // Ctrl+E — Editor tab
        if (ctrl && key.toLowerCase() === 'e') {
          event.preventDefault();
          if (state.currentData) setTab('editor');
          return;
        }
        // Ctrl+P — Preview tab
        if (ctrl && key.toLowerCase() === 'p') {
          event.preventDefault();
          if (state.currentData) setTab('preview');
          return;
        }
        // Ctrl+Shift+F — Cycle filter
        if (ctrl && event.shiftKey && key.toLowerCase() === 'f') {
          event.preventDefault();
          const idx = FILTERS.findIndex(f => f.key === state.filter);
          setFilter(FILTERS[(idx + 1) % FILTERS.length].key);
          return;
        }
        // N — New file (when not in input/textarea)
        if (key.toLowerCase() === 'n' && !ctrl && !['input', 'textarea', 'select'].includes(tag) && !state.modalOpen) {
          event.preventDefault();
          openCreateModal();
          return;
        }
        // Escape — Close modals / context menus
        if (key === 'Escape') {
          if (state.modalOpen) { closeModal(); return; }
          if (state.contextMenu) { closeContextMenu(); return; }
        }
        // / — Focus search
        if (key === '/' && !state.modalOpen && !['input', 'textarea', 'select'].includes(tag)) {
          event.preventDefault();
          document.getElementById('file-search')?.focus();
          return;
        }
        // ↑/↓ — Navigate tree items (when search is focused)
        if ((key === 'ArrowDown' || key === 'ArrowUp') && document.activeElement?.id === 'file-search') {
          event.preventDefault();
          const rows = document.querySelectorAll('.tree-row');
          if (!rows.length) return;
          const active = document.querySelector('.tree-row.active');
          let idx = active ? Array.from(rows).indexOf(active) : -1;
          idx = key === 'ArrowDown' ? Math.min(idx + 1, rows.length - 1) : Math.max(idx - 1, 0);
          if (idx >= 0) {
            rows[idx].scrollIntoView({ block: 'nearest' });
            rows[idx].click();
          }
        }
      });

      window.addEventListener('beforeunload', (event) => {
        if (!state.dirty) return;
        event.preventDefault();
        event.returnValue = '';
      });

      document.getElementById('modal').addEventListener('click', (event) => {
        if (event.target.id === 'modal') closeModal();
      });
      document.addEventListener('click', () => closeContextMenu());
      window.addEventListener('scroll', () => closeContextMenu(), true);
      document.addEventListener('contextmenu', (event) => {
        if (!event.target.closest('.tree-row') && !event.target.closest('.panel-header-main')) {
          closeContextMenu();
        }
      });
    }

    async function boot() {
      restoreTheme();
      restoreSidebar();
      restoreDensity();
      setupKeyboard();
      initTauriDragDrop();
      renderActivity();
      await refreshWorkspace({ preserveCurrent: false });

      // Listen for file-change events from Rust (replaces polling)
      try {
        window.__TAURI__?.event?.listen?.('files-changed', () => {
          pollWorkspace();
        });
      } catch (_) {}
      // Fallback: still poll when window gains focus (for external edits)
      window.addEventListener('focus', () => pollWorkspace());
      const lastFile = localStorage.getItem('admin-last-file');
      if (lastFile && state.files.some(file => file.path === lastFile)) {
        await loadFile(lastFile, { silent: true });
      }
      showToast('Dashboard ready. Search files with /, quick-open with Ctrl+K, and save with Ctrl+S.', 'info');
    }

    boot().catch((error) => {
      console.error(error);
      showToast(error.message || 'Failed to load dashboard.', 'error');
      logActivity('Dashboard error', error.message || String(error), 'error');
    });
  </script>
