<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --surface3: #11161d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #f0a500;
      --accent-dim: rgba(240, 165, 0, 0.12);
      --correct: #2ea043;
      --wrong: #da3633;
      --blue: #58a6ff;
      --purple: #d2a8ff;
      --radius: 8px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.25), 0 1px 3px rgba(0, 0, 0, 0.12);
      --transition: 0.2s ease;
    }

    [data-theme="light"] {
      --bg: #f3f0eb;
      --surface: #ffffff;
      --surface2: #f8f6f1;
      --surface3: #f0ece5;
      --border: #d0ccc5;
      --text: #1c1917;
      --text-muted: #78716c;
      --accent: #c27803;
      --accent-dim: rgba(194, 120, 3, 0.1);
      --correct: #16a34a;
      --wrong: #dc2626;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: var(--border) var(--bg);
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.95rem 1.4rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #17120a;
      font-weight: 800;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .save-indicator-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; flex: none;
      background: var(--correct);
      transition: background 0.3s ease;
    }
    .save-indicator-dot.dirty { background: var(--accent); }
    .save-indicator-dot.syncing { background: var(--blue); }
    .save-indicator-dot.failed { background: var(--wrong); }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn,
    .icon-btn,
    .filter-btn,
    .tab-btn,
    .ghost-btn {
      border: 1px solid transparent;
      background: var(--surface2);
      color: var(--text);
      transition: transform var(--transition), border-color var(--transition), background var(--transition), color var(--transition), opacity var(--transition);
    }

    .btn,
    .ghost-btn {
      border-radius: 999px;
      min-height: 42px;
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover,
    .ghost-btn:hover,
    .icon-btn:hover,
    .filter-btn:hover,
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface3);
    }

    .btn-primary {
      background: var(--accent);
      color: #17120a;
      border-color: transparent;
    }

    .btn-primary:hover {
      color: #17120a;
      opacity: 0.92;
      background: var(--accent);
      transform: translateY(-1px);
    }

    /* Dropdown Actions Styling */
    .dropdown {
      position: relative;
      display: inline-block;
    }
    
    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 110%;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 1000;
      min-width: 175px;
      padding: 0.4rem 0;
      flex-direction: column;
      animation: dropdownFadeIn 0.15s ease-out;
    }
    
    @keyframes dropdownFadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .dropdown-item {
      text-align: left;
      background: none;
      border: none;
      padding: 0.6rem 1rem;
      width: 100%;
      color: var(--text);
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: background var(--transition), color var(--transition);
      font-weight: 500;
      font-family: inherit;
    }
    
    .dropdown-item:hover {
      background: var(--surface2) !important;
      color: var(--accent) !important;
    }
    
    .dropdown-item.danger {
      color: #ff6b6b !important;
    }
    
    .dropdown-item.danger:hover {
      background: rgba(255, 107, 107, 0.15) !important;
      color: #ff8787 !important;
    }

    .btn-danger {
      color: var(--wrong);
      border-color: transparent;
    }

    .btn-danger:hover {
      color: #fff;
      background: var(--wrong);
      border-color: transparent;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .page {
      flex: 1;
      width: 100vw;
      max-width: 100%;
      margin: 0;
      padding: 1rem;
      display: grid;
      grid-template-rows: 1fr;
      min-height: 0;
    }

    .panel,
    .sidebar,
    .activity {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .stat-card {
      padding: 0.9rem 1rem;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(220px, 22%) minmax(0, 1fr);
      gap: 0.8rem;
      height: 100%;
      min-height: 0;
      transition: grid-template-columns 0.3s ease;
    }

    .main-grid.sidebar-collapsed {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .sidebar.collapsed {
      display: none;
    }

    .sidebar {
      padding: 0.65rem;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .sidebar-header h2,
    .section-title,
    .panel-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .sidebar-subtitle,
    .muted {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 0.4rem;
    }

    .search-input,
    .text-input,
    .select-input,
    .text-area {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 0.5rem 0.65rem;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .select-input {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238b949e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1.1em;
      padding-right: 2.5rem;
      cursor: pointer;
    }

    .search-input {
      padding-left: 2.2rem;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
      width: 15px;
      height: 15px;
    }

    .search-input:focus,
    .text-input:focus,
    .select-input:focus,
    .text-area:focus {
      border-color: var(--accent);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.4rem;
    }

    .filter-btn {
      border-radius: 999px;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tree-wrap {
      min-height: 0;
      overflow: auto;
      padding-right: 0.15rem;
      border-top: 1px solid var(--border);
      margin-top: 0.05rem;
      padding-top: 0.4rem;
    }

    .file-tree,
    .file-tree ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-tree ul {
      margin-left: 0.55rem;
      padding-left: 0.5rem;
      border-left: 1px solid var(--border);
    }

    .tree-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.12rem 0.3rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      margin-bottom: 0;
      font-size: 0.82rem;
      min-height: 26px;
      content-visibility: auto;
      contain-intrinsic-size: auto 28px;
    }

    .tree-row:hover {
      background: var(--surface2);
    }

    .tree-row.active {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 65%, var(--border));
    }

    .tree-chevron {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      flex: none;
      transition: transform 0.15s ease;
      border-radius: 3px;
    }
    .tree-chevron:hover {
      background: var(--surface3);
    }
    .tree-chevron.open {
      transform: rotate(90deg);
    }

    .tree-icon {
      width: 18px;
      text-align: center;
      flex: none;
      font-size: 0.85rem;
    }

    .tree-name {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .tree-type-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: none;
      display: inline-block;
    }
    .tree-type-dot.type-quiz { background: var(--accent); }
    .tree-type-dot.type-bank { background: var(--purple); }
    .tree-type-dot.type-index { background: var(--blue); }
    .tree-type-dot.type-flashcard { background: var(--correct); }
    .tree-type-dot.type-written { background: #d946ef; }
    .tree-type-dot.type-html { background: var(--text-muted); }
    .tree-type-dot.type-folder { background: var(--text-muted); opacity: 0.5; }

    .tree-row .tree-actions {
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .tree-row:hover .tree-actions,
    .tree-row:focus-within .tree-actions {
      opacity: 1;
    }

    .tree-add-btn {
      width: 22px;
      height: 22px;
      min-height: 22px;
      border-radius: 6px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .content-stack {
      display: grid;
      gap: 1.1rem;
      height: 100%;
      grid-template-rows: 1fr;
      min-height: 0;
    }

    .panel {
      padding: 1rem;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .panel-header-main {
      min-width: 0;
      flex: 1;
      cursor: context-menu;
    }

    .panel-path {
      margin-top: 0.35rem;
      color: var(--text-muted);
      word-break: break-word;
      font-size: 0.92rem;
    }

    .panel-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .meta-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
    }

    .meta-label {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
    }

    .meta-value {
      font-weight: 700;
      word-break: break-word;
    }

    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-bottom: 1rem;
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--surface);
      padding: 0.5rem 0 0.25rem;
    }

    .tab-btn {
      border-radius: 999px;
      min-height: 38px;
      padding: 0.58rem 1rem;
      cursor: pointer;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .subpanel {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .subpanel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .preview-frame {
      width: 100%;
      min-height: 600px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .preview-toolbar,
    .status-strip,
    .validation-strip,
    .wizard-summary,
    .context-menu {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
    }

    .preview-toolbar,
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: center;
      padding: 0.75rem 0.85rem;
      margin-bottom: 0.9rem;
    }

    .validation-strip {
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.9rem;
    }

    .validation-list {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.55rem;
    }

    .validation-item {
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface3);
      font-size: 0.88rem;
    }

    .validation-item.error {
      border-color: color-mix(in srgb, var(--wrong) 55%, var(--border));
    }

    .validation-item.warning {
      border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: var(--surface3);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }

    .editor-toolbar-actions {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    .editor-card.collapsed .editor-card-body {
      display: none;
    }

    .editor-summary {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.1rem;
    }

    .editor-grid {
      display: grid;
      gap: 1rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 0.9rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-weight: 600;
    }

    .field small {
      color: var(--text-muted);
    }

    .text-area {
      min-height: 110px;
      resize: vertical;
    }

    .text-area.code {
      min-height: 520px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre;
    }

    .editor-list {
      display: grid;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .editor-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      padding: 0.95rem;
      display: grid;
      gap: 0.8rem;
    }

    .editor-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .editor-card-title {
      font-weight: 800;
      color: var(--accent);
    }

    .mini-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid transparent;
      background: var(--surface3);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .modal-tab-content {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .modal-tab-content.active {
      display: block;
    }

    .mini-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface2);
    }

    .mini-btn.delete:hover {
      border-color: var(--wrong);
      color: var(--wrong);
      background: var(--surface2);
    }

    .option-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.65rem;
      align-items: center;
      margin-bottom: 0.55rem;
    }

    .option-row input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--correct);
      cursor: pointer;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1rem;
    }

    .overview-card {
      padding: 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: grid;
      gap: 0.75rem;
    }

    .overview-list,
    .activity-list {
      display: grid;
      gap: 0.8rem;
    }

    .overview-list a:hover {
      color: var(--accent);
    }

    .overview-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .overview-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      margin-top: 0.45rem;
      flex: none;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: var(--surface3);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .status-good {
      color: var(--correct);
    }

    .status-warn {
      color: var(--accent);

  <script>
    // ─── Tauri IPC Bridge ────────────────────────────────────────────────────────
    // Replaces Flask fetch() calls with native Tauri invoke() calls.
    // Maps URL patterns to Tauri command names and extracts args accordingly.

    const __ROUTE_MAP = {
      '/admin/files': { cmd: 'list_files', method: 'GET' },
      '/admin/project-state': { cmd: 'project_state', method: 'GET' },
      '/admin/load-file': { cmd: 'load_file', method: 'GET', queryParam: 'path' },
      '/admin/save-file': { cmd: 'save_file', method: 'POST' },
      '/admin/validate-file': { cmd: 'validate_file', method: 'POST' },
      '/admin/create-folder': { cmd: 'create_folder', method: 'POST' },
      '/admin/create-file': { cmd: 'create_file', method: 'POST' },
      '/admin/duplicate-file': { cmd: 'duplicate_file', method: 'POST' },
      '/admin/move-file': { cmd: 'move_file', method: 'POST' },
      '/admin/delete-file': { cmd: 'delete_file', method: 'POST' },
      '/admin/delete-folder': { cmd: 'delete_folder', method: 'POST' },
      '/admin/convert-file': { cmd: 'convert_file', method: 'POST' },
      '/admin/convert-to-flashcard': { cmd: 'convert_to_flashcard', method: 'POST' },
      '/admin/run-sync': { cmd: 'run_sync', method: 'POST' },
      '/admin/git-commit': { cmd: 'git_commit', method: 'POST' },
      '/admin/git-pull': { cmd: 'git_pull', method: 'POST' },
      '/admin/git-push': { cmd: 'git_push', method: 'POST' },
      '/admin/provider-verify': { cmd: 'provider_verify', method: 'POST' },
      '/admin/provider-deploy': { cmd: 'provider_deploy', method: 'POST' },
      '/admin/read-saved-token': { cmd: 'read_saved_token', method: 'GET', queryParam: 'provider' },
      '/admin/save-token': { cmd: 'save_token', method: 'POST' },
      '/admin/parse-json-questions': { cmd: 'parse_json_questions', method: 'POST' },
      '/admin/load-exports-batch': { cmd: 'load_exports_batch', method: 'POST' },
    };

    async function fetchJson(url, options = {}) {
      const [rawPath, rawQuery] = url.split('?');
      const route = __ROUTE_MAP[rawPath];
      if (!route) {
        // Fallback for non-mapped routes if they exist
        const response = await fetch(url, options);
        return response.json();
      }

      let args = {};
      if (route.queryParam && rawQuery) {
        const params = new URLSearchParams(rawQuery);
        args[route.queryParam] = params.get(route.queryParam) || '';
      }
      if (options.body) {
        try { args = { ...args, ...JSON.parse(options.body) }; } catch (e) { }
      }

      try {
        const result = await window.__TAURI__.core.invoke(route.cmd, args);
        return result;
      } catch (err) {
        let parsed = null;
        if (typeof err === 'string') {
          try { parsed = JSON.parse(err); } catch (_) { }
        }
        if (parsed && parsed.message) throw Object.assign(new Error(parsed.message), parsed);
        throw new Error(typeof err === 'string' ? err : JSON.stringify(err));
      }
    }

    function previewUrl(filePath) {
      const port = window.__QUIZ_SERVER_PORT || 5500;
      return `http://127.0.0.1:${port}/${filePath}`;
    }

    async function openInBrowser(url) {
      try {
        await window.__TAURI__.core.invoke('open_in_browser', { url });
      } catch (err) {
        console.error('Failed to open in browser:', err);
      }
    }

    window.__previewUrl = previewUrl;
    window.__openInBrowser = openInBrowser;
  </script>

  <script>
    const state = {
      files: [],
      folders: [],
      projectState: null,
      filter: localStorage.getItem('admin-filter') || 'all',
      search: localStorage.getItem('admin-search') || '',
      openFolders: new Set(JSON.parse(localStorage.getItem('admin-open-folders') || '[""]')),
      currentFile: null,
      currentData: null,
      loadedMeta: null,
      currentTab: 'preview',
      dirty: false,
      activity: [],
      modalOpen: false,
      modalQuestions: [],
      modalTab: 'basic',
      syncState: 'saved',
      syncMessage: 'Workspace ready.',
      validation: null,
      contextMenu: null,
      pendingAction: null,
      quickOpenQuery: '',
      collapsedQuestions: new Set(),
      recentFolders: JSON.parse(localStorage.getItem('admin-recent-folders') || '[]'),
      wizard: null,
    };

    const FILTERS = [
      { key: 'all', label: 'All' },
      { key: 'quiz', label: 'Quiz' },
      { key: 'bank', label: 'Bank' },
      { key: 'flashcard', label: 'Flashcard' },
      { key: 'written', label: 'Written' },
      { key: 'index', label: 'Index' },
      { key: 'html', label: 'Other HTML' },
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function saveUiPrefs() {
      localStorage.setItem('admin-filter', state.filter);
      localStorage.setItem('admin-search', state.search);
      localStorage.setItem('admin-open-folders', JSON.stringify(Array.from(state.openFolders)));
      localStorage.setItem('admin-recent-folders', JSON.stringify(state.recentFolders.slice(0, 8)));
      if (state.currentFile) localStorage.setItem('admin-last-file', state.currentFile);
    }

    function rememberRecent(listName, value) {
      if (!value) return;
      const list = state[listName] || [];
      const next = [value, ...list.filter(item => item !== value)].slice(0, 8);
      state[listName] = next;
      saveUiPrefs();
    }

    function encodePath(path) {
      return String(path).split('/').map(encodeURIComponent).join('/');
    }

    function badgeClassForTone(tone) {
      if (tone === 'success') return 'status-good';
      if (tone === 'warn') return 'status-warn';
      if (tone === 'error') return 'status-bad';
      return 'status-info';
    }

    function nowTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function updateSaveDot() {
      const dot = document.getElementById('save-indicator-dot');
      if (!dot) return;
      dot.className = 'save-indicator-dot';
      if (state.dirty) dot.classList.add('dirty');
      else if (state.syncState === 'syncing') dot.classList.add('syncing');
      else if (state.syncState === 'sync-failed') dot.classList.add('failed');
    }

    function setDirty(dirty) {
      state.dirty = !!dirty;
      const indicator = document.getElementById('save-indicator');
      if (indicator) indicator.textContent = state.dirty ? 'unsaved changes' : (state.syncState === 'needs-sync' ? 'saved, sync recommended' : 'ready');
      updateSaveDot();
      renderStatusStrip();
    }

    function setSyncState(syncState, message = '') {
      state.syncState = syncState;
      state.syncMessage = message || state.syncMessage;
      const indicator = document.getElementById('save-indicator');
      if (indicator) {
        if (state.dirty) indicator.textContent = 'unsaved changes';
        else if (syncState === 'needs-sync') indicator.textContent = 'saved, sync recommended';
        else if (syncState === 'syncing') indicator.textContent = 'syncing';
        else if (syncState === 'sync-failed') indicator.textContent = 'sync failed';
        else indicator.textContent = 'ready';
      }
      updateSaveDot();
      renderStatusStrip();
    }

    function showToast(message, tone = 'info') {
      let stack = document.getElementById('toast-stack');
      if (!stack) {
        stack = document.createElement('div');
        stack.id = 'toast-stack';
        stack.className = 'toast-stack';
        document.body.appendChild(stack);
      }
      const toast = document.createElement('div');
      toast.className = `toast ${tone}`;
      toast.textContent = message;
      stack.prepend(toast);
      window.setTimeout(() => toast.remove(), 3600);
    }

    function logActivity(title, detail = '', tone = 'info') {
      state.activity.unshift({ title, detail, tone, time: nowTime() });
      state.activity = state.activity.slice(0, 30);
      renderActivity();
    }

    function toggleTheme() {
      const root = document.documentElement;
      const current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      const next = current === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('admin-theme', next);
      syncThemeButton();
    }

    function syncThemeButton() {
      const btn = document.getElementById('theme-toggle');
      const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      if (btn) btn.textContent = current === 'light' ? '🌙' : '☀';
    }

    function restoreTheme() {
      const saved = localStorage.getItem('admin-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      syncThemeButton();
    }

    function toggleSidebar() {
      const grid = document.querySelector('.main-grid');
      const sidebar = document.querySelector('.sidebar');
      if (grid && sidebar) {
        grid.classList.toggle('sidebar-collapsed');
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('admin-sidebar-collapsed', sidebar.classList.contains('collapsed') ? 'true' : 'false');
      }
    }

    function restoreSidebar() {
      const isCollapsed = localStorage.getItem('admin-sidebar-collapsed') === 'true';
      if (isCollapsed) {
        document.querySelector('.main-grid')?.classList.add('sidebar-collapsed');
        document.querySelector('.sidebar')?.classList.add('collapsed');
      }
    }

    function toggleDensity() {
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('density-toggle');
      if (!sidebar) return;
      const isCompact = !sidebar.classList.contains('comfortable');
      sidebar.classList.toggle('comfortable', !isCompact);
      localStorage.setItem('admin-density', isCompact ? 'compact' : 'comfortable');
      if (btn) btn.textContent = isCompact ? '⊞' : '⊟';
    }

    function restoreDensity() {
      const saved = localStorage.getItem('admin-density') || 'compact';
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('density-toggle');
      if (!sidebar) return;
      if (saved === 'comfortable') {
        sidebar.classList.add('comfortable');
        if (btn) btn.textContent = '⊟';
      } else {
        sidebar.classList.remove('comfortable');
        if (btn) btn.textContent = '⊞';
      }
    }

    async function pollWorkspace() {
      try {
        const [filePayload, projectState] = await Promise.all([
          fetchJson(`/admin/files?t=${Date.now()}`),
          fetchJson(`/admin/project-state?t=${Date.now()}`),
        ]);
        const newHash = JSON.stringify((filePayload.files || []).map(f => f.path));
        const oldHash = JSON.stringify(state.files.map(f => f.path));
        if (newHash !== oldHash) {
          state.files = filePayload.files || [];
          state.folders = filePayload.folders || [];
          state.projectState = projectState;
          renderTree();
        }
      } catch (e) { }
    }

    function slugifyClient(value, fallback = 'untitled') {
      const slug = String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-{2,}/g, '-').replace(/^-|-$/g, '');
      return slug || fallback;
    }

    function snakeifyClient(value, fallback = 'item') {
      const slug = String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/_{2,}/g, '_').replace(/^_|_$/g, '');
      return slug || fallback;
    }

    function buildDerivedUid(folder, stem) {
      const parts = [];
      if (folder && folder !== '.') parts.push(...String(folder).split('/').filter(Boolean));
      parts.push(stem);
      return snakeifyClient(parts.join('_'), 'quiz_file');
    }

    function defaultQuestion() {
      return { question: '', options: ['', '', '', ''], correct: 0, explanation: '' };
    }

    function fixOCRArtifacts(input) {
      return input.replace(/[\u2B0D\u2AF9\u2C55]/g, '\u2264').replace(/[\u2B0E\u2AFA\u2C56]/g, '\u2265').replace(/\u242E/g, '\u03BC');
    }

    function normaliseAndEscapeCurlyQuotes(input) {
      const CURLY_DQ = /[\u201C\u201D\u00AB\u00BB\u201E\u201F]/;
      const CURLY_SQ = /[\u2018\u2019\u2032\u02BC]/;
      let result = ''; let i = 0; let inString = false; let stringChar = '';
      while (i < input.length) {
        const ch = input[i];
        if (!inString) {
          if (ch === '"' || ch === "'") { inString = true; stringChar = ch; result += ch; }
          else if (CURLY_DQ.test(ch)) result += '"';
          else if (CURLY_SQ.test(ch)) result += "'";
          else result += ch;
        } else {
          if (ch === '\\') { result += ch; i++; if (i < input.length) result += input[i]; }
          else if (ch === stringChar) { inString = false; result += ch; stringChar = ''; }
          else if (CURLY_DQ.test(ch)) result += '\\"';
          else if (CURLY_SQ.test(ch)) result += "'";
          else result += ch;
        }
        i++;
      }
      return result;
    }

    function sanitizeStringsStateMachine(str) {
      let result = ''; let i = 0; let inString = false; let stringStartQuote = '';
      while (i < str.length) {
        const char = str[i];
        if (!inString) {
          if (char === '"' || char === "'" || char === '`') { inString = true; stringStartQuote = char; result += '"'; }
          else result += char;
        } else {
          if (char === '\\') {
            i++;
            if (i < str.length) {
              const escaped = str[i];
              if (escaped === "'" && stringStartQuote === "'") result += "'";
              else if (escaped === '`' && stringStartQuote === '`') result += '`';
              else if (escaped === "'" && stringStartQuote !== "'") result += "'";
              else if (escaped === '\n' || escaped === '\r') {}
              else result += '\\' + escaped;
            }
          } else if (char === stringStartQuote) {
            if (stringStartQuote === '"') {
              let j = i + 1;
              while (j < str.length && (str[j] === ' ' || str[j] === '\t')) j++;
              const peek = j < str.length ? str[j] : '';
              const isClose = peek === '' || peek === ',' || peek === '}' || peek === ']' || peek === ':' || peek === '\n' || peek === '\r';
              if (isClose) { inString = false; result += '"'; stringStartQuote = ''; }
              else result += '\\"';
            } else { inString = false; result += '"'; stringStartQuote = ''; }
          } else if (char === '"' && stringStartQuote !== '"') result += '\\"';
          else if (char === "'" && stringStartQuote !== "'") result += "'";
          else if (char === '`' && stringStartQuote !== '`') result += '`';
          else if (char === '\n') result += '\\n';
          else if (char === '\r') result += '\\r';
          else if (char === '\t') result += '\\t';
          else if (char === '\b') result += '\\b';
          else if (char === '\f') result += '\\f';
          else if (char.charCodeAt(0) < 0x20) result += '\\u' + char.charCodeAt(0).toString(16).padStart(4, '0');
          else result += char;
        }
        i++;
      }
      return result;
    }

    function cleanJSArrayInput(input) {
      let result = input.replace(/^\uFEFF/, '');
      result = result.replace(/```(?:json|javascript|js)?\s*/gi, '').replace(/```\s*$/g, '');
      result = fixOCRArtifacts(result);
      // Normalize typographic/curly quotes to straight ASCII equivalents.
      result = result.replace(/[\u201C\u201D\u00AB\u00BB\u201E\u201F]/g, '"')
                     .replace(/[\u2018\u2019\u2032\u02BC]/g, "'");
      // Remove trailing commas before ] or } (inspired by bank-maker)
      result = result.replace(/,(\s*[\]\}])/g, '$1');
      // Ensure the result is wrapped in array brackets so JSON.parse always works
      result = result.trim();
      if (!result.startsWith('[')) result = '[' + result;
      if (!result.endsWith(']')) result = result + ']';
      return result;
    }

    /**
     * Recursively extract question arrays from wrapper objects.
     * Handles: {questions:[...]}, {QUESTION_BANK:[...]}, {data:{questions:[...]}}, etc.
     * Returns an array of question items, or null if no questions array found.
     */
    function extractQuestionsArray(obj, depth = 0) {
      if (depth > 4) return null; // prevent infinite recursion
      if (!obj || typeof obj !== 'object') return null;
      if (Array.isArray(obj)) return obj; // already an array

      // Check all known keys that might hold a questions array
      const questionArrayKeys = [
        'questions', 'QUESTION_BANK', 'QUESTIONS', 'questionBank',
        'question_bank', 'items', 'data', 'quiz', 'quizzes', 'bank'
      ];
      for (const k of questionArrayKeys) {
        const val = obj[k];
        if (val === undefined || val === null) continue;
        if (Array.isArray(val)) {
          // Check if this array looks like it contains question objects
          if (val.length > 0 && val.some(v => v && typeof v === 'object' && (v.question || v.questionText || v.question_text || v.prompt || v.text || v.options || v.choices))) {
            return val;
          }
          // Even if no obvious question markers, return it if non-empty (normalizeQuestionItem will handle it)
          if (val.length > 0) return val;
        }
        if (val && typeof val === 'object' && !Array.isArray(val)) {
          const nested = extractQuestionsArray(val, depth + 1);
          if (nested && nested.length > 0) return nested;
        }
      }
      return null;
    }

    function normalizeQuestionItem(item) {
      if (!item || typeof item !== 'object') return null;

      // If the item itself looks like a wrapper (has a questions array but no question text),
      // try to extract questions from it recursively
      if (!item.question && !item.questionText && !item.question_text && !item.prompt && !item.text && !item.q) {
        const innerQuestions = extractQuestionsArray(item);
        if (innerQuestions && innerQuestions.length > 0) {
          // Return a marker so the caller can flatten nested arrays
          return { __unwrap: innerQuestions };
        }
      }

      // 1. Find question text
      let question = '';
      const questionKeys = ['question', 'questionText', 'question_text', 'prompt', 'text', 'q'];
      for (const k of questionKeys) {
        if (item[k] !== undefined && item[k] !== null) {
          question = String(item[k]);
          break;
        }
      }

      // 2. Find options
      let options = null;
      const optionsKeys = ['options', 'choices', 'answers', 'optionsList', 'options_list'];
      for (const k of optionsKeys) {
        if (Array.isArray(item[k])) {
          options = item[k].map(opt => String(opt || '').trim());
          break;
        }
      }
      if (!options) {
        const individualOptions = [];
        const alphabet = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        let hasOptionKeys = false;
        for (let idx = 0; idx < alphabet.length; idx++) {
          const key = `option${alphabet[idx]}`;
          if (item[key] !== undefined && item[key] !== null) {
            individualOptions.push(String(item[key]).trim());
            hasOptionKeys = true;
          }
        }
        if (!hasOptionKeys) {
          for (let idx = 0; idx < alphabet.length; idx++) {
            const key = alphabet[idx];
            if (item[key] !== undefined && item[key] !== null) {
              individualOptions.push(String(item[key]).trim());
            }
          }
        }
        if (individualOptions.length >= 2) {
          options = individualOptions;
        }
      }
      if (!options) {
        options = ['', '', '', ''];
      }

      // 3. Find explanation
      let explanation = '';
      const explanationKeys = ['explanation', 'explanationText', 'explanation_text', 'exp', 'rationale', 'feedback'];
      for (const k of explanationKeys) {
        if (item[k] !== undefined && item[k] !== null) {
          explanation = String(item[k]);
          break;
        }
      }

      // 4. Find correct answer index
      let correct = 0;
      let foundCorrect = false;
      const correctKeys = ['correct', 'correctAnswer', 'correct_answer', 'answer', 'correctOption', 'correct_option', 'key'];
      for (const k of correctKeys) {
        const val = item[k];
        if (val !== undefined && val !== null) {
          const valStr = String(val).trim();
          if (/^[A-H]$/i.test(valStr)) {
            correct = valStr.toUpperCase().charCodeAt(0) - 65;
            foundCorrect = true;
          } else {
            const valNum = Number(valStr);
            if (!Number.isNaN(valNum) && Number.isInteger(valNum)) {
              correct = valNum;
              foundCorrect = true;
            } else {
              const optIdx = options.findIndex(opt => opt.toLowerCase() === valStr.toLowerCase());
              if (optIdx >= 0) {
                correct = optIdx;
                foundCorrect = true;
              }
            }
          }
          if (foundCorrect) break;
        }
      }

      if (correct > 0 && correct >= options.length) {
        correct = options.length - 1;
      } else if (correct < 0) {
        correct = 0;
      }

      return {
        question: question.trim(),
        options,
        correct,
        explanation: explanation.trim()
      };
    }

    /**
     * Flatten the result of normalizeQuestionItem, handling __unwrap markers
     * for wrapper objects that contain nested question arrays.
     */
    function flattenNormalizedQuestions(items) {
      const result = [];
      for (const item of items) {
        if (!item) continue;
        if (item.__unwrap) {
          // Recursively normalize the unwrapped items
          for (const sub of item.__unwrap) {
            const normalized = normalizeQuestionItem(sub);
            if (normalized) {
              if (normalized.__unwrap) {
                result.push(...flattenNormalizedQuestions([normalized]));
              } else {
                result.push(normalized);
              }
            }
          }
        } else {
          result.push(item);
        }
      }
      return result;
    }

    function sanitizeForJSON(str) {
      // Fast path: already valid JSON
      try { JSON.parse(str); return str.trim(); } catch (_) {}
      let result = str;
      // Remove block comments
      result = result.replace(/\/\*[\s\S]*?\*\//g, '');
      // Remove line comments (not inside strings)
      result = result.replace(/(\"(?:[^\"\\]|\\.)*\"|'(?:[^'\\]|\\.)*')|(\/\/[^\n]*)/gm, (m, s) => s || '');
      // Quote unquoted keys
      result = result.replace(/([\{,]\s*)([a-zA-Z_$][a-zA-Z_$0-9]*)(\s*:)/g, '$1"$2"$3');
      // Convert single-quoted strings to double-quoted
      result = result.replace(/'((?:[^'\\]|\\.)*)'/g, '"$1"');
      // Convert backtick strings to double-quoted (inspired by bank-maker)
      result = result.replace(/`((?:[^`\\]|\\.)*)`/g, '"$1"');
      // Use state machine to properly handle strings and escape control characters (inspired by bank-maker)
      result = sanitizeStringsStateMachine(result);
      // Fix unescaped double quotes — PASS 1: Merge adjacent broken strings
      let prevResult;
      do {
        prevResult = result;
        result = result.replace(/(:\s*)"([^"]*)"([",:\]\}\{\[]+)"/g, function(match, prefix, content1, content2) {
          return prefix + '"' + content1 + content2 + '"';
        });
        result = result.replace(/(,\s*)"([^"]*)"([",:\]\}\{\[]+)"/g, function(match, prefix, content1, content2) {
          return prefix + '"' + content1 + content2 + '"';
        });
        result = result.replace(/(\[\s*)"([^"]*)"([",:\]\}\{\[]+)"/g, function(match, prefix, content1, content2) {
          return prefix + '"' + content1 + content2 + '"';
        });
      } while (result !== prevResult);
      // After initial fixes, try parsing again
      try { JSON.parse(result); return result.trim(); } catch (_) {}
      // PASS 2: More aggressive fix for strings with multiple internal quotes
      do {
        prevResult = result;
        result = result.replace(/(:\s*)"([^"]*(?:"[^"]*)+)"/g, function(match, prefix, fullContent) {
          const clean = fullContent.replace(/"/g, '');
          return prefix + '"' + clean + '"';
        });
        result = result.replace(/(,\s*)"([^"]*(?:"[^"]*)+)"/g, function(match, prefix, fullContent) {
          const clean = fullContent.replace(/"/g, '');
          return prefix + '"' + clean + '"';
        });
        result = result.replace(/(\[\s*)"([^"]*(?:"[^"]*)+)"/g, function(match, prefix, fullContent) {
          const clean = fullContent.replace(/"/g, '');
          return prefix + '"' + clean + '"';
        });
      } while (result !== prevResult);
      // Remove trailing commas before ] or }
      result = result.replace(/,(\s*[\]\}])/g, '$1');
      // Remove trailing semicolons
      result = result.replace(/;\s*$/, '');
      return result.trim();
    }

    /**
     * Helper: try to extract a questions array from any parsed value.
     * Handles arrays directly, objects with known keys, and nested structures.
     */
    function tryExtractQuestions(parsed) {
      if (!parsed) return null;
      // Direct array
      if (Array.isArray(parsed)) return parsed;
      // Object with known question-array keys
      if (typeof parsed === 'object') {
        const extracted = extractQuestionsArray(parsed);
        if (extracted && extracted.length > 0) return extracted;
      }
      return null;
    }

    /**
     * Helper: normalize a raw list of items into proper question objects,
     * flattening any wrapper objects encountered via __unwrap markers.
     */
    function normalizeQuestionList(list) {
      const raw = list.map(normalizeQuestionItem).filter(Boolean);
      return flattenNormalizedQuestions(raw);
    }

    function parseImportedQuestions(raw) {
      let text = String(raw || '').trim();
      if (!text) return { questions: [], issues: [] };

      // ── Pre-clean: always normalize first (like bank-maker does) ──
      // Remove BOM, code fences, and normalize curly quotes BEFORE any strategy.
      // Previous code tried the raw text first (Strategy 0), but this caused
      // issues when files had BOMs or encoding artifacts that prevented JSON.parse
      // from working even though the content was otherwise valid JSON.
      text = text.replace(/^\uFEFF/, '');                              // Remove BOM
      text = text.replace(/^\s*```(?:json|js|javascript)?\s*/i, '');   // Remove opening code fence
      text = text.replace(/\s*```\s*$/i, '');                          // Remove closing code fence

      let cleanText = text;
      // Extract from JS const assignment: const QUESTION_BANK = [...]; or const QUESTIONS = [...];
      const blockMatch = text.match(/const\s+(?:QUESTION_BANK|QUESTIONS)\s*=\s*(\[[\s\S]*\]);?/);
      if (blockMatch) {
        cleanText = blockMatch[1];
      }

      const issues = [];

      // ── Strategy 0: Direct JSON.parse on the pre-cleaned text ──
      // After BOM and code-fence removal, most valid JSON files parse here.
      try {
        const arr = JSON.parse(cleanText);
        const list = tryExtractQuestions(arr);
        if (list && list.length > 0) {
          return { questions: normalizeQuestionList(list), issues: [] };
        }
      } catch (_) {}

      // ── Strategy 1: JSON.parse after cleanJSArrayInput (handles missing brackets, curly quotes, etc.) ──
      try {
        const cleaned = cleanJSArrayInput(cleanText);
        const arr = JSON.parse(cleaned);
        const list = tryExtractQuestions(arr);
        if (list && list.length > 0) {
          return { questions: normalizeQuestionList(list), issues: [] };
        }
      } catch (_) {}

      // ── Strategy 2: Sanitized JSON.parse (handles trailing commas, comments, unquoted keys) ──
      try {
        const sanitized = sanitizeForJSON(cleanJSArrayInput(cleanText));
        const arr = JSON.parse(sanitized);
        const list = tryExtractQuestions(arr);
        if (list && list.length > 0) {
          return { questions: normalizeQuestionList(list), issues: [] };
        }
      } catch (_) {}

      // ── Strategy 3: new Function() eval (handles JS syntax: single quotes, trailing commas, unquoted keys, comments) ──
      try {
        const cleaned = cleanJSArrayInput(cleanText);
        let parsed = null;
        try {
          parsed = new Function('return (' + cleaned + ')')();
        } catch (_) {
          const wrapped = cleaned.startsWith('[') ? cleaned : '[' + cleaned + ']';
          parsed = new Function('return (' + wrapped + ')')();
        }
        const list = tryExtractQuestions(parsed);
        if (list && list.length > 0) {
          return { questions: normalizeQuestionList(list), issues: [] };
        }
      } catch (_) {}

      // ── Strategy 4: Plain-text MCQ fallback (blank-line-separated blocks) ──
      const questions = text
        .split(/\n\s*\n/)
        .map(block => block.trim())
        .filter(Boolean)
        .map((block, index) => {
          const lines = block.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
          const questionLine = lines.shift() || '';
          const options = [];
          let correct = 0;
          let explanation = '';
          lines.forEach(line => {
            if (/^(answer|correct)\s*:/i.test(line)) {
              const answerRaw = line.split(':').slice(1).join(':').trim();
              const answerLetter = answerRaw.charAt(0).toUpperCase();
              const fromLetter = answerLetter ? answerLetter.charCodeAt(0) - 65 : Number(answerRaw) - 1;
              if (!Number.isNaN(fromLetter) && fromLetter >= 0) correct = fromLetter;
              return;
            }
            if (/^explanation\s*:/i.test(line)) {
              explanation = line.split(':').slice(1).join(':').trim();
              return;
            }
            const optionMatch = line.match(/^(?:[-*]|\(?[A-Ha-h1-8]\)?[.)-])\s*(.+)$/);
            if (optionMatch) options.push(optionMatch[1].trim());
          });
          if (!questionLine || options.length < 2) {
            issues.push(`Block ${index + 1} could not be parsed into a full MCQ.`);
          }
          return {
            question: questionLine.replace(/^\d+[\).:-]\s*/, ''),
            options: options.length ? options : ['', '', '', ''],
            correct,
            explanation,
          };
        });
      return { questions: questions.filter(item => item.question || item.options.some(Boolean)), issues };
    }

    function validateQuestionListClient(questions) {
      const isFlashcard = state.wizard?.type === 'flashcard';
      const isWritten = state.wizard?.type === 'written';
      const skipOptions = isFlashcard || isWritten;
      const issues = [];
      if (!Array.isArray(questions) || !questions.length) {
        issues.push({ level: 'warning', message: 'No questions yet.', field: 'questions' });
        return issues;
      }
      questions.forEach((question, index) => {
        const prompt = String(question.question || '').trim();
        const options = Array.isArray(question.options) ? question.options.map(option => String(option || '').trim()) : [];
        const correct = Number(question.correct || 0);
        if (!prompt) issues.push({ level: 'error', message: `Question ${index + 1} is missing its prompt.`, field: `questions.${index}.question` });
        if (isWritten && !String(question.modelAnswer || '').trim()) issues.push({ level: 'warning', message: `Written question ${index + 1} has no model answer. AI grading may be less effective.`, field: `questions.${index}.modelAnswer` });
        if (!skipOptions && options.length < 2) issues.push({ level: 'error', message: `Question ${index + 1} needs at least 2 options.`, field: `questions.${index}.options` });
        if (!skipOptions && options.length >= 2 && options.some(option => !option)) issues.push({ level: 'warning', message: `Question ${index + 1} has a blank option.`, field: `questions.${index}.options` });
        if (!skipOptions && (correct < 0 || correct >= options.length)) issues.push({ level: 'error', message: `Question ${index + 1} has an invalid correct answer.`, field: `questions.${index}.correct` });
      });
      return issues;
    }

    function renderValidationIssues(issues, { empty = 'No validation issues right now.' } = {}) {
      if (!issues?.length) return `<div class="muted">${escapeHtml(empty)}</div>`;
      return `<div class="validation-list">${issues.map(issue => `
        <div class="validation-item ${escapeHtml(issue.level || 'warning')}">
          <strong>${escapeHtml((issue.level || 'warning').toUpperCase())}</strong> ${escapeHtml(issue.message || '')}
        </div>
      `).join('')}</div>`;
    }



    async function refreshWorkspace({ preserveCurrent = true } = {}) {
      const [filePayload, projectState] = await Promise.all([
        fetchJson(`/admin/files?t=${Date.now()}`),
        fetchJson(`/admin/project-state?t=${Date.now()}`),
      ]);
      state.files = filePayload.files || [];
      state.folders = filePayload.folders || [];
      state.projectState = projectState;
      const search = document.getElementById('file-search');
      if (search && search.value !== state.search) search.value = state.search;
      renderFilters();
      renderTree();
      if (preserveCurrent && state.currentFile) {
        const stillExists = state.files.some(file => file.path === state.currentFile);
        if (!stillExists) {
          state.currentFile = null;
          state.currentData = null;
          state.loadedMeta = null;
          setDirty(false);
        }
      }
      if (!state.currentFile) {
        renderOverview();
      } else {
        const active = state.files.find(file => file.path === state.currentFile);
        if (active) {
          await loadFile(active.path, { silent: true, keepTab: true, forceRefresh: true });
        } else {
          renderOverview();
        }
      }
      const dirtyCount = projectState?.git?.dirtyCount || 0;
      logActivity('Workspace refreshed', dirtyCount ? `${dirtyCount} git changes detected.` : 'Working tree is clean.', 'info');
    }

    function renderFilters() {
      const row = document.getElementById('filter-row');
      row.innerHTML = FILTERS.map(filter => `
        <button class="filter-btn ${state.filter === filter.key ? 'active' : ''}" onclick="setFilter('${filter.key}')">
          ${escapeHtml(filter.label)}
        </button>
      `).join('');
    }

    function setFilter(filter) {
      state.filter = filter;
      saveUiPrefs();
      renderFilters();
      renderTree();
    }

    let _searchDebounceTimer;

    function setSearch(value) {
      state.search = String(value || '').toLowerCase();
      saveUiPrefs();
      clearTimeout(_searchDebounceTimer);
      _searchDebounceTimer = setTimeout(renderTree, 150);
    }

    function getFilteredFiles() {
      return state.files.filter(file => {
        const matchesType = state.filter === 'all' ? true : file.type === state.filter;
        if (!matchesType) return false;
        if (!state.search) return true;
        const haystack = [
          file.path,
          file.title || '',
          file.uid || '',
          file.description || '',
        ].join(' ').toLowerCase();
        return haystack.includes(state.search);
      });
    }

    function buildTreeFromFiles(files) {
      const root = {};
      for (const file of files) {
        const parts = file.path.split('/');
        let cursor = root;
        let running = '';
        for (let i = 0; i < parts.length - 1; i += 1) {
          const part = parts[i];
          running = running ? `${running}/${part}` : part;
          if (!cursor[part]) {
            cursor[part] = { kind: 'folder', path: running, children: {} };
          }
          cursor = cursor[part].children;
        }
        cursor[parts[parts.length - 1]] = { kind: 'file', record: file };
      }
      return root;
    }

    function sortTreeEntries(entries) {
      return Object.entries(entries).sort((a, b) => {
        const aFolder = a[1].kind === 'folder';
        const bFolder = b[1].kind === 'folder';
        if (aFolder !== bFolder) return aFolder ? -1 : 1;
        return a[0].localeCompare(b[0]);
      });
    }

    function renderTree() {
      const filtered = getFilteredFiles();
      const treeRoot = document.getElementById('file-tree-root');
      const tree = buildTreeFromFiles(filtered);
      const summary = document.getElementById('sidebar-summary');
      summary.textContent = `${filtered.length} visible files across ${state.folders.length} folders`;
      if (!filtered.length) {
        treeRoot.innerHTML = `<div class="empty-state">No files match the current search or filter.</div>`;
        return;
      }
      treeRoot.innerHTML = renderTreeLevel(tree, '');
    }

    function renderTreeLevel(node, parentPath) {
      const items = sortTreeEntries(node).map(([name, item]) => {
        if (item.kind === 'folder') {
          const open = state.search ? true : state.openFolders.has(item.path);
          const fId = 'fol-' + item.path.replace(/[^a-z0-9]/gi, '_');
          const childrenHtml = open ? renderTreeLevel(item.children, item.path) : '';
          return `
            <li id="${fId}">
              <div class="tree-row folder-row" onclick="toggleFolder('${escapeHtml(item.path)}')" oncontextmenu="openFolderContextMenu(event, '${escapeHtml(item.path)}')">
                <button class="tree-chevron ${open ? 'open' : ''}" onclick="event.stopPropagation();toggleFolder('${escapeHtml(item.path)}')">▶</button>
                <span class="tree-icon">${open ? '📂' : '📁'}</span>
                <span class="tree-name">${escapeHtml(name)}</span>
                <span class="tree-type-dot type-folder"></span>
                <span class="tree-actions">
                  <button class="mini-btn tree-add-btn" onclick="event.stopPropagation();openFolderQuickAdd(event, '${escapeHtml(item.path)}')" title="Add here">+</button>
                </span>
              </div>
              ${open ? `<ul class="file-tree">${childrenHtml}</ul>` : ''}
            </li>
          `;
        }
        const file = item.record;
        const active = state.currentFile === file.path ? 'active' : '';
        const tip = `${file.title || file.name} | ${file.type}${file.uid ? ' | ' + file.uid : ''}${file.question_count ? ' | ' + file.question_count + ' questions' : ''}`;
        return `
          <li>
            <div class="tree-row ${active}" onclick="requestLoadFile('${escapeHtml(file.path)}')" oncontextmenu="openFileContextMenu(event, '${escapeHtml(file.path)}')" title="${escapeHtml(tip)}">
              <span class="tree-icon">${escapeHtml(file.icon || '📄')}</span>
              <span class="tree-name">${escapeHtml(file.name)}</span>
              <span class="tree-type-dot type-${escapeHtml(file.type === 'html' ? 'html' : file.type)}"></span>
            </div>
          </li>
        `;
      });
      return `<ul class="file-tree">${items.join('')}</ul>`;
    }

    function toggleFolder(path) {
      const wasOpen = state.openFolders.has(path);
      if (wasOpen) {
        state.openFolders.delete(path);
      } else {
        state.openFolders.add(path);
      }
      saveUiPrefs();

      // Lazy expand/collapse: find the <li> by ID and insert/remove children
      const fId = 'fol-' + path.replace(/[^a-z0-9]/gi, '_');
      const li = document.getElementById(fId);
      if (li) {
        const existing = li.querySelector('ul');
        if (existing) {
          existing.remove();
        } else if (!wasOpen) {
          const filtered = getFilteredFiles();
          const allTree = buildTreeFromFiles(filtered);
          const parts = path.split('/');
          let cursor = allTree;
          for (const p of parts) {
            if (cursor[p]?.kind === 'folder') cursor = cursor[p].children;
          }
          const html = renderTreeLevel(cursor, path);
          if (html) {
            // renderTreeLevel returns <ul class="file-tree">...</ul>
            li.insertAdjacentHTML('beforeend', html);
          }
        }
        const chevron = li.querySelector('.tree-chevron');
        const icon = li.querySelector('.tree-icon');
        if (chevron) chevron.classList.toggle('open', !wasOpen);
        if (icon) icon.textContent = wasOpen ? '📁' : '📂';
        return;
      }
      renderTree();
    }

    function copyTextValue(value, label = 'Value') {
      navigator.clipboard.writeText(String(value || '')).then(() => {
        showToast(`${label} copied.`, 'success');
      }).catch(() => {
        showToast(`Could not copy ${label.toLowerCase()}.`, 'warn');
      });
    }

    function closeContextMenu() {
      state.contextMenu = null;
      const menu = document.getElementById('context-menu');
      if (menu) {
        menu.classList.remove('open');
        menu.innerHTML = '';
      }
    }

    function openContextMenu(event, title, actions) {
      event.preventDefault();
      event.stopPropagation();
      const menu = document.getElementById('context-menu');
      if (!menu) return;
      const validActions = (actions || []).filter(Boolean);
      menu.innerHTML = `
        <div class="context-menu-title">${escapeHtml(title)}</div>
        ${validActions.map(action => action.divider ? '<div class="context-divider"></div>' : `
          <button class="${action.danger ? 'danger' : ''}" onclick="${action.onclick}">
            ${escapeHtml(action.label)}
          </button>
        `).join('')}
      `;
      const x = Math.min(event.clientX, window.innerWidth - 260);
      const y = Math.min(event.clientY, window.innerHeight - 320);
      menu.style.left = `${Math.max(10, x)}px`;
      menu.style.top = `${Math.max(10, y)}px`;
      menu.classList.add('open');
      state.contextMenu = { title };
    }

    function openFolderQuickAdd(event, folderPath) {
      event.stopPropagation();
      openContextMenu(event, folderPath === '.' ? 'Root actions' : `${folderPath} actions`, [
        { label: 'New Quiz Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'quiz' })` },
        { label: 'New Bank Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'bank' })` },
        { label: 'New Flashcard Deck Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'flashcard' })` },
        { label: 'New Written Assessment Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'written' })` },
        { label: 'New Folder Here', onclick: `closeContextMenu(); openNewFolderModal('${escapeHtml(folderPath)}')` },
        state.currentFile ? { label: 'Duplicate Active File Here', onclick: `closeContextMenu(); openDuplicateModal('${escapeHtml(folderPath)}')` } : null,
      ]);
    }

    function openFolderContextMenu(event, folderPath) {
      const isOpen = state.search ? true : state.openFolders.has(folderPath);
      openContextMenu(event, folderPath === '.' ? 'Root folder' : folderPath, [
        { label: 'New Quiz Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'quiz' })` },
        { label: 'New Bank Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'bank' })` },
        { label: 'New Flashcard Deck Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'flashcard' })` },
        { label: 'New Written Assessment Here', onclick: `closeContextMenu(); openNewFileWizard({ folder: '${escapeHtml(folderPath)}', type: 'written' })` },
        { label: 'New Folder Here', onclick: `closeContextMenu(); openNewFolderModal('${escapeHtml(folderPath)}')` },
        state.currentFile ? { label: 'Duplicate Active File Here', onclick: `closeContextMenu(); openDuplicateModal('${escapeHtml(folderPath)}')` } : null,
        { divider: true },
        { label: isOpen ? 'Collapse Folder' : 'Expand Folder', onclick: `closeContextMenu(); toggleFolder('${escapeHtml(folderPath)}')` },
        { label: 'Copy Folder Path', onclick: `closeContextMenu(); copyTextValue('${escapeHtml(folderPath)}', 'Folder path')` },
        folderPath !== '.' ? { label: 'Delete Folder', danger: true, onclick: `closeContextMenu(); deleteFolderConfirm('${escapeHtml(folderPath)}')` } : null,
      ]);
    }

    function deleteFolderConfirm(folderPath) {
      const fileCount = state.files.filter(f => f.path.startsWith(folderPath + '/') || (folderPath === '.' ? false : false)).length;
      const cnt = state.files.filter(f => folderPath === '.' ? false : f.path.startsWith(folderPath + '/')).length;
      openModal({
        title: 'Delete Folder',
        subtitle: 'This permanently deletes the folder and all its contents.',
        body: `
          <div class="empty-state" style="text-align:left;">
            <strong>${escapeHtml(folderPath)}</strong><br><br>
            This folder contains <strong>${cnt}</strong> file(s).<br>
            Deleting is irreversible. Run sync afterward to refresh indexes.
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-danger" onclick="closeModal(); executeDeleteFolder('${escapeHtml(folderPath)}')">Yes, Delete Folder</button>
          </div>
        `,
      });
    }

    function openFileContextMenu(event, filePath) {
      const file = state.files.find(item => item.path === filePath);
      openContextMenu(event, file?.title || filePath, [
        { label: 'Open', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}')` },
        { label: 'Preview', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { tab: 'preview' })` },
        { label: 'Open Parent Folder', onclick: `closeContextMenu(); expandFolderForFile('${escapeHtml(filePath)}'); saveUiPrefs(); renderTree();` },
        { divider: true },
        { label: 'Duplicate', onclick: `closeContextMenu(); openDuplicateModal('', '${escapeHtml(filePath)}')` },
        { label: 'Move/Rename', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { afterLoadAction: 'openMoveModal' })` },
        (file?.type === 'quiz' || file?.type === 'bank') ? { label: 'Convert Quiz/Bank', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { afterLoadAction: 'convertFile' })` } : null,

        file?.type === 'flashcard' ? { label: 'Convert to Quiz', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { afterLoadAction: 'convertFile' })` } : null,
        file?.type === 'written' ? { label: 'Convert to Quiz', onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { afterLoadAction: 'convertFile' })` } : null,
        { divider: true },
        { label: 'Copy Path', onclick: `closeContextMenu(); copyTextValue('${escapeHtml(filePath)}', 'Path')` },
        { label: 'Delete', danger: true, onclick: `closeContextMenu(); requestLoadFile('${escapeHtml(filePath)}', { afterLoadAction: 'openDeleteModal' })` },
      ]);
    }

    function openActiveFileContextMenu(event) {
      if (!state.currentFile) return;
      openFileContextMenu(event, state.currentFile);
    }

    function expandFolderForFile(filePath) {
      const folder = filePath.includes('/') ? filePath.slice(0, filePath.lastIndexOf('/')) : '.';
      if (folder && folder !== '.') {
        let current = '';
        folder.split('/').forEach(part => {
          current = current ? `${current}/${part}` : part;
          state.openFolders.add(current);
        });
      }
    }

      const modalActive = state.modalOpen && state.modalTab === 'activity';
      if (!modalActive) return;
      const body = document.getElementById('activity-modal-body');
      if (!body) return;

      const items = state.activity.length ? state.activity.map(item => `
        <div class="activity-entry" style="margin-bottom: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;">
          <div class="activity-title ${badgeClassForTone(item.tone)}" style="font-weight: 700; font-size: 0.95rem;">${escapeHtml(item.title)}</div>
          <div class="activity-meta" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.2rem; white-space: pre-wrap;">${escapeHtml(item.time)}${item.detail ? '\n' + escapeHtml(item.detail) : ''}</div>
        </div>
      `).join('') : `<div class="empty-state">No activity yet. Actions, sync output, and git feedback will appear here.</div>`;
      body.innerHTML = items;
    }

    function openActivityModal() {
      state.modalTab = 'activity';
      openModal({
        title: 'Recent Activity',
        subtitle: 'Latest project actions and system feedback.',
        body: '<div id="activity-modal-body" class="activity-list" style="max-height: 500px; overflow-y: auto;"></div>',
        onOpen: () => renderActivity()
      });
    }

    function gitStatusSummary(git) {
      if (!git?.available) return 'Git repository not detected.';
      const branch = git.branch || 'unknown';
      if (!git.dirtyCount) return `Branch ${branch} is clean.`;
      return `${git.dirtyCount} changed path(s) on branch ${branch}.`;
    }

          <div class="badge-row">

        <div class="overview-grid">

            <div class="section-title">Repository Rules</div>

              <div class="overview-item"><div class="overview-dot"></div><div><strong>Use sync after content changes.</strong><div class="muted">This keeps generated indexes, tracker maps, and <code>sw.js</code> in step.</div></div></div>

                  <div class="overview-item">
                    <div class="overview-dot"></div>
                    <div>
                      <strong>${escapeHtml(file.title || file.name)}</strong>
                      <div class="muted">${escapeHtml(file.path)}</div>
                    </div>
                  </div>
                </a>
              `).join('') : '<div class="muted">No HTML files found yet.</div>'}
            </div>
          </div>
          <div class="overview-card">
            <div class="section-title">Built-in Tools</div>
            <div class="overview-list">
              <div class="overview-item">
                <div class="overview-dot"></div>
                <div>
                  <strong><a href="#" onclick="event.preventDefault(); openPdfExporterModal()">PDF Exporter</a></strong>
                  <div class="muted">Generate printable PDF versions of your quizzes and banks.</div>
