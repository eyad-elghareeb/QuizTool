            </div>

            <div class="overview-section-card">
              <div class="overview-section-card-title">
                <span>⌨️</span> Keyboard Shortcuts
              </div>
              <div class="kbd-grid">
                <div class="kbd-row"><span class="kbd">Ctrl</span><span class="kbd">S</span><span class="kbd-desc">Save current file</span></div>
                <div class="kbd-row"><span class="kbd">Esc</span><span class="kbd-desc">Close modal</span></div>
                <div class="kbd-row"><span class="kbd">/</span><span class="kbd-desc">Focus file search</span></div>
              </div>
            </div>

          </div>
        </div>

        <!-- Rules card -->
        <div class="overview-section-card" style="margin-bottom:0.5rem">
          <div class="overview-section-card-title"><span>📋</span> Repository Rules</div>
          <div class="overview-repo-rules">
            <div><span>→</span><div><strong>Never rename deployed UIDs.</strong> <span style="color:var(--text-muted)">New file creation follows folder and filename path patterns automatically.</span></div></div>
            <div><span>→</span><div><strong>Use sync after content changes.</strong> <span style="color:var(--text-muted)">This keeps generated indexes, tracker maps, and sw.js in step.</span></div></div>
            <div><span>→</span><div><strong>Keep engines at the root.</strong> <span style="color:var(--text-muted)">Generated quiz, bank, and index pages compute their prefixes from folder depth.</span></div></div>
          </div>
        </div>
      `;
    }
    function renderStatusStrip() {
      const host = document.getElementById('panel-status-strip');
      if (!host) return;
      const chips = [];
      if (state.dirty) chips.push({ tone: 'warn', text: 'Unsaved changes' });
      else chips.push({ tone: 'success', text: 'Saved locally' });
      if (state.syncState === 'needs-sync') chips.push({ tone: 'warn', text: 'Sync recommended' });
      if (state.syncState === 'syncing') chips.push({ tone: 'info', text: 'Sync running' });
      if (state.syncState === 'sync-failed') chips.push({ tone: 'error', text: 'Sync failed' });
      if (state.validation?.errors?.length) chips.push({ tone: 'error', text: `${state.validation.errors.length} validation error(s)` });
      else if (state.validation?.warnings?.length) chips.push({ tone: 'warn', text: `${state.validation.warnings.length} validation warning(s)` });
      host.innerHTML = `
        <div class="status-strip">
          ${chips.map(chip => `<div class="status-chip ${badgeClassForTone(chip.tone)}">${escapeHtml(chip.text)}</div>`).join('')}
          <div class="muted" style="margin-left:auto;">${escapeHtml(state.syncMessage || 'Workspace ready.')}</div>
        </div>
      `;
    }

    function renderValidationPanel() {
      const host = document.getElementById('panel-validation-host');
      if (!host) return;
      if (!state.validation) {
        host.innerHTML = '';
        return;
      }
      host.innerHTML = `
        <div class="validation-strip">
          <strong>Validation</strong>
          ${renderValidationIssues([...(state.validation.errors || []), ...(state.validation.warnings || [])], { empty: 'No validation issues.' })}
        </div>
      `;
    }

    async function validateCurrentFile({ silent = true } = {}) {
      if (!state.currentFile || !state.currentData) return null;
      const payload = {
        path: state.currentFile,
        content: state.currentData.content,
        original_uid: state.loadedMeta?.uid || '',
      };
      const result = await fetchJson('/admin/validate-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      state.validation = result.validation;
      if (!silent) {
        const tone = result.ok ? 'success' : 'warn';
        showToast(result.message || 'Validation complete.', tone);
      }
      renderStatusStrip();
      renderValidationPanel();
      return result.validation;
    }

    function runNamedAction(actionName) {
      if (actionName && typeof window[actionName] === 'function') {
        window[actionName]();
      }
    }

    function openUnsavedChangesModal(nextAction) {
      state.pendingAction = nextAction;
      openModal({
        title: 'Unsaved Changes',
        subtitle: 'Choose what to do before leaving this file.',
        body: `
          <div class="empty-state" style="text-align:left;">
            This file has unsaved changes. You can save now, discard the edits, or stay on the current file.
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal(); state.pendingAction = null;">Cancel</button>
            <button class="btn" onclick="discardPendingChanges()">Discard</button>
            <button class="btn btn-primary" onclick="saveAndContinuePending()">Save</button>
          </div>
        `,
      });
    }

    async function saveAndContinuePending() {
      closeModal();
      const saved = await saveFile({ quiet: true });
      if (saved && typeof state.pendingAction === 'function') {
        const next = state.pendingAction;
        state.pendingAction = null;
        await next();
      }
    }

    function discardPendingChanges() {
      closeModal();
      setDirty(false);
      if (typeof state.pendingAction === 'function') {
        const next = state.pendingAction;
        state.pendingAction = null;
        next();
      }
    }

    async function requestLoadFile(path, options = {}) {
      const { afterLoadAction = '', ...loadOptions } = options || {};
      if (state.dirty && path !== state.currentFile) {
        openUnsavedChangesModal(async () => {
          await loadFile(path, loadOptions);
          runNamedAction(afterLoadAction);
        });
        return;
      }
      const result = await loadFile(path, loadOptions);
      runNamedAction(afterLoadAction);
      return result;
    }

    async function loadFile(path, { silent = false, keepTab = false, tab = null, forceRefresh = false } = {}) {
      if (!forceRefresh && state.currentFile === path && state.currentData) {
        if (!keepTab) state.currentTab = tab || 'preview';
        else if (tab) state.currentTab = tab;
        renderFilePanel();
        return state.currentData;
      }
      const data = await fetchJson(`/admin/load-file?path=${encodeURIComponent(path)}`);
      state.currentFile = path;
      state.currentData = data;
      state.loadedMeta = clone(data.meta || {});
      state.validation = null;
      rememberRecent('recentFolders', path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '.');
      expandFolderForFile(path);
      saveUiPrefs();
      if (!keepTab) state.currentTab = tab || 'preview';
      else if (tab) state.currentTab = tab;
      setDirty(false);
      setSyncState('saved', `Loaded ${path}`);
      renderFilePanel();
      renderTree();
      if (!silent) logActivity('Loaded file', path, 'info');
      return data;
    }

    function renderFilePanel() {
      const panel = document.getElementById('workspace-panel');
      if (!state.currentData) {
        renderOverview();
        return;
      }
      const meta = state.currentData.meta || {};
      const pUrl = previewUrl(encodePath(state.currentFile)) + `?v=${Date.now()}`;
      const canStructuredEdit = ['quiz', 'bank', 'flashcard', 'written', 'osce', 'index'].includes(meta.type);
      const isExportable = ['quiz', 'bank', 'flashcard', 'written', 'osce'].includes(meta.type);

      let content = '';
      if (state.currentTab === 'preview') {
        content = `<div class="preview-toolbar">
            <button class="mini-btn" onclick="renderFilePanel()">Reload Preview</button>
            <button class="mini-btn" onclick="openInBrowser(previewUrl(encodePath(state.currentFile)))">Open in Browser</button>
            <button class="mini-btn" onclick="openInBrowser('/' + encodePath(state.currentFile))">Open Real File</button>
            ${state.currentFile.includes('/') ? `<button class="mini-btn" onclick="openInBrowser('/' + encodePath(state.currentFile.slice(0, state.currentFile.lastIndexOf('/')) + '/index.html'))">Open Parent Index</button>` : ''}
          </div>
          <div id="preview-frame-container" style="flex:1;display:flex;min-height:0;"></div>`;
      } else if (state.currentTab === 'editor' && canStructuredEdit) {
        content = renderStructuredEditor(meta);
      } else if (state.currentTab === 'metadata') {
        content = `<textarea class="text-area code" readonly>${escapeHtml(JSON.stringify(meta, null, 2))}</textarea>`;
      } else {
        content = `<textarea id="raw-html" class="text-area code" style="flex: 1;" oninput="onRawInput()">${escapeHtml(state.currentData.content || '')}</textarea>`;
      }

      panel.innerHTML = `
        <div class="panel-header">
          <div class="panel-header-main" oncontextmenu="openActiveFileContextMenu(event)">
            <div class="panel-title">${meta.title || meta.filename || 'New File'}</div>
            <div class="panel-path">${escapeHtml(state.currentFile)}</div>
          </div>
          <div class="panel-actions" style="display: flex; gap: 0.5rem; align-items: center;">
            ${(() => { const a = getPrimaryActionState(); if (a.action) return `<button class="btn ${a.tone === 'primary' ? 'btn-primary' : a.tone === 'warn' ? 'btn' : a.tone === 'error' ? 'btn btn-danger' : 'btn'}" onclick="${a.action}">${escapeHtml(a.label)}</button>`; return `<button class="btn" disabled>${escapeHtml(a.label)}</button>`; })()}
            <div class="dropdown">
              <button class="btn icon-btn" onclick="toggleMoreActionsDropdown(event)" title="More Actions" style="min-height: 42px; display: flex; align-items: center; justify-content: center; width: 42px; padding: 0;">⋮</button>
              <div id="more-actions-dropdown" class="dropdown-menu">
                <button class="dropdown-item" onclick="runSync()"><span style="font-size: 1.1rem;">🔄</span> Sync Project</button>
                ${isExportable ? `<button class="dropdown-item" onclick="openPdfExporterModal()"><span style="font-size: 1.1rem;">📄</span> Export PDF</button>` : ''}
                <button class="dropdown-item" onclick="openDuplicateModal()"><span style="font-size: 1.1rem;">👯</span> Duplicate File</button>
                <button class="dropdown-item" onclick="openMoveModal()"><span style="font-size: 1.1rem;">📂</span> Move / Rename</button>
                <div style="border-top: 1px solid var(--border); margin: 0.3rem 0;"></div>
                <button class="dropdown-item danger" onclick="openDeleteModal()"><span style="font-size: 1.1rem;">🗑️</span> Delete File</button>
              </div>
            </div>
          </div>
        </div>

        <div id="panel-status-strip"></div>
        <div id="panel-validation-host"></div>

        <div class="tab-row">
          <button class="tab-btn ${state.currentTab === 'preview' ? 'active' : ''}" onclick="setTab('preview')">Preview</button>
          <button class="tab-btn ${state.currentTab === 'editor' ? 'active' : ''}" onclick="setTab('editor')">Editor</button>
          <button class="tab-btn ${state.currentTab === 'metadata' ? 'active' : ''}" onclick="setTab('metadata')">Metadata</button>
          <button class="tab-btn ${state.currentTab === 'raw' ? 'active' : ''}" onclick="setTab('raw')">Raw HTML</button>
        </div>

        <div class="panel-body" style="flex: 1; overflow: auto; min-height: 0; margin-top: 1rem; display: flex; flex-direction: column;">
          ${content}
        </div>
      `;
      // Preview iframe recycling — cache and reuse across tab switches
      if (state.currentTab === 'preview') {
        const container = document.getElementById('preview-frame-container');
        if (container) {
          const cached = document.getElementById('cached-preview-frame');
          if (cached && cached.dataset.path === state.currentFile) {
            container.appendChild(cached);
          } else {
            const old = document.getElementById('cached-preview-frame');
            if (old) old.remove();
            const iframe = document.createElement('iframe');
            iframe.id = 'cached-preview-frame';
            iframe.className = 'preview-frame';
            iframe.dataset.path = state.currentFile;
            iframe.src = previewUrl(encodePath(state.currentFile)) + `?v=${Date.now()}`;
            iframe.style.cssText = 'flex:1;min-height:0;border:1px solid var(--border);border-radius:10px;background:#fff;';
            iframe.title = 'Preview';
            container.appendChild(iframe);
          }
        }
      } else {
        // Cache the iframe off-screen when not on preview tab
        const cached = document.getElementById('cached-preview-frame');
        if (cached && cached.parentNode) cached.remove();
      }

      renderStatusStrip();
      renderValidationPanel();
    }

    function renderMetaCard(label, value) {
      return `<div class="meta-card"><div class="meta-label">${escapeHtml(label)}</div><div class="meta-value">${escapeHtml(value)}</div></div>`;
    }

    function setTab(tab) {
      state.currentTab = tab;
      renderFilePanel();
    }

    function renderStructuredEditor(meta) {
      if (meta.type === 'quiz' || meta.type === 'bank' || meta.type === 'flashcard' || meta.type === 'written' || meta.type === 'osce') {
        return renderQuizBankEditor(meta);
      }
      if (meta.type === 'index') {
        return renderIndexEditor(meta);
      }
      return '<div class="empty-state">Structured editing is not available for this file type.</div>';
    }

    function getPrimaryActionState() {
      if (state.dirty) {
        if (state.validation?.errors?.length) return { label: 'Validate', action: 'validateCurrentFile({ silent: false })', tone: 'warn' };
        return { label: 'Save', action: 'saveFile()', tone: 'primary' };
      }
      if (state.syncState === 'needs-sync') return { label: 'Sync', action: 'runSync()', tone: 'primary' };
      if (state.syncState === 'syncing') return { label: 'Syncing...', action: '', tone: 'info' };
      if (state.syncState === 'sync-failed') return { label: 'Sync Failed', action: 'runSync()', tone: 'error' };
      if (state.projectState?.git?.dirtyCount) return { label: 'Deploy', action: 'openDeployModal()', tone: 'primary' };
      return { label: 'Saved', action: '', tone: 'success' };
    }

    function renderQuizBankEditor(meta) {
      const isBank = meta.type === 'bank' || meta.type === 'flashcard';
      const isFlashcard = meta.type === 'flashcard';
      const isWritten = meta.type === 'written';
      const isOsce = meta.type === 'osce';
      const questions = meta.questions || [];
      const topFields = `
        <div class="editor-grid">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; align-items:start;">
            <div class="field" style="margin:0;">
              <label>UID</label>
              <input class="text-input" id="cfg-uid" value="${escapeHtml(meta.config?.uid || '')}" oninput="syncQuizBankEditor()">
              <small>Keep this stable for deployed files to preserve progress and tracker data.</small>
            </div>
            <div class="field" style="margin:0;">
              <label>Title</label>
              <input class="text-input" id="cfg-title" value="${escapeHtml(meta.config?.title || '')}" oninput="syncQuizBankEditor()">
            </div>
          </div>
          <div class="field full">
            <label>Description</label>
            <textarea class="text-area" id="cfg-description" oninput="syncQuizBankEditor()">${escapeHtml(meta.config?.description || '')}</textarea>
          </div>
          ${(isBank || isWritten || isOsce) ? `
            <div class="field" style="max-width:300px;">
              <label>Icon</label>
              <input class="text-input" id="cfg-icon" value="${escapeHtml(meta.config?.icon || (isFlashcard ? '🃏' : isWritten ? '✍️' : isOsce ? '🩺' : '🗃️'))}" oninput="syncQuizBankEditor()">
            </div>
            ${isFlashcard ? `
            <div class="field full">
              <label>Custom Script</label>
              <textarea class="text-area" id="cfg-custom-script" oninput="syncQuizBankEditor()" placeholder="Optional custom JavaScript for card rendering behavior. Wraps between CUSTOM_SCRIPT markers." style="min-height:80px;">${escapeHtml(meta.customScript || '')}</textarea>
              <small>JavaScript inserted into the flashcard HTML between <code>/* [CUSTOM_SCRIPT_START] */</code> markers. Useful for custom card types or logic.</small>
            </div>
            ` : ''}
          ` : ''}
      `;
      return `
        ${topFields}
          <div class="panel-grid">
            ${renderMetaCard(isOsce ? 'Cases' : 'Questions', questions.length)}
            ${renderMetaCard('Mode', isOsce ? 'OSCE Virtual Patients' : (isWritten ? 'Written Assessment' : (isFlashcard ? 'Flashcard' : (isBank ? 'Bank' : 'Quiz'))))}
            ${renderMetaCard('Engine', isOsce ? 'osce-engine.js' : (isWritten ? 'written-engine.js' : (isFlashcard ? 'flashcard-engine.js' : (isBank ? 'bank-engine.js' : 'quiz-engine.js'))))}
          </div>
          <div class="editor-toolbar">
            <div class="muted">Collapse large sets to scan and reorder them faster.</div>
            <div class="editor-toolbar-actions">
              <button class="mini-btn" onclick="collapseAllQuestions()">Collapse All</button>
              <button class="mini-btn" onclick="expandAllQuestions()">Expand All</button>
            </div>
          </div>
          <div class="editor-list">
            ${questions.map((question, index) => renderQuestionCard(question, index)).join('')}
          </div>
          <button class="btn" onclick="addQuestion()">${isOsce ? 'Add Case' : 'Add Question'}</button>
        </div>
      `;
    }

    function childLetter(n) {
      // 0 -> 'A)', 1 -> 'B)', etc.
      return String.fromCharCode(65 + n) + ')';
    }

    function renderWrittenChildRow(child, qIdx, cIdx, total) {
      const label = child.label || childLetter(cIdx);
      const summaryText = (child.question || 'Empty part').slice(0, 60);
      return `
        <div class="child-editor-card" data-cidx="${cIdx}" style="border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.75rem; background:var(--surface2); margin-bottom:0.5rem;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:0.5rem; margin-bottom:0.4rem;">
            <div style="font-weight:700; font-size:0.8rem; color:var(--accent);">Part ${escapeHtml(label)}</div>
            <div class="mini-actions">
              <button class="mini-btn" onclick="moveChildPart(${qIdx}, ${cIdx}, -1)" ${cIdx === 0 ? 'disabled' : ''}>Up</button>
              <button class="mini-btn" onclick="moveChildPart(${qIdx}, ${cIdx}, 1)" ${cIdx === total - 1 ? 'disabled' : ''}>Down</button>
              <button class="mini-btn" onclick="duplicateChildPart(${qIdx}, ${cIdx})">Dup</button>
              <button class="mini-btn delete" onclick="removeChildPart(${qIdx}, ${cIdx})">Remove</button>
            </div>
          </div>
          <div class="field" style="margin-bottom:0.4rem;">
            <label style="font-size:0.75rem;">Label</label>
            <input class="text-input wq-child-label" data-index="${qIdx}" data-cidx="${cIdx}" value="${escapeHtml(child.label || childLetter(cIdx))}" oninput="syncQuizBankEditor()" placeholder="A)" style="max-width:120px;">
          </div>
          <div class="field" style="margin-bottom:0.4rem;">
            <label style="font-size:0.75rem;">Part Question</label>
            <textarea class="text-area wq-child-question" data-index="${qIdx}" data-cidx="${cIdx}" oninput="syncQuizBankEditor()" style="min-height:60px;">${escapeHtml(child.question || '')}</textarea>
          </div>
          <div class="field" style="margin-bottom:0.4rem;">
            <label style="font-size:0.75rem;">Model Answer <span class="muted" style="font-weight:400;">(this part only)</span></label>
            <textarea class="text-area wq-child-model-answer" data-index="${qIdx}" data-cidx="${cIdx}" oninput="syncQuizBankEditor()" style="min-height:80px;">${escapeHtml(child.modelAnswer || '')}</textarea>
          </div>
          <div class="field" style="margin-bottom:0.4rem;">
            <label style="font-size:0.75rem;">Rubric <span class="muted" style="font-weight:400;">(optional)</span></label>
            <textarea class="text-area wq-child-rubric" data-index="${qIdx}" data-cidx="${cIdx}" oninput="syncQuizBankEditor()" style="min-height:50px;">${escapeHtml(child.rubric || '')}</textarea>
          </div>
          <div class="field">
            <label style="font-size:0.75rem;">Explanation <span class="muted" style="font-weight:400;">(optional)</span></label>
            <textarea class="text-area wq-child-explanation" data-index="${qIdx}" data-cidx="${cIdx}" oninput="syncQuizBankEditor()" style="min-height:50px;">${escapeHtml(child.explanation || '')}</textarea>
          </div>
        </div>
      `;
    }

    function renderWrittenQuestionCard(question, index) {
      const collapsed = state.collapsedQuestions.has(index);
      const summary = `${(question.question || 'Untitled written question').slice(0, 90)}${(question.question || '').length > 90 ? '…' : ''}`;
      const tags = Array.isArray(question.tags) ? question.tags.join(', ') : (typeof question.tags === 'string' ? question.tags : '');
      const children = Array.isArray(question.children) ? question.children : [];
      const childrenHtml = children.map((child, ci) => renderWrittenChildRow(child, index, ci, children.length)).join('');
      const convertBtn = children.length
        ? `<button class="mini-btn" onclick="convertToSingle(${index})">Convert to Single</button>`
        : `<button class="mini-btn" onclick="convertToMultiPart(${index})">Convert to Multi-part</button>`;
      return `
        <div class="editor-card ${collapsed ? 'collapsed' : ''}" data-qidx="${index}">
          <div class="editor-card-header">
            <div>
              <div class="editor-card-title">Written Question ${index + 1}${children.length ? ' <span style="color:var(--accent); font-size:0.75rem;">· ' + children.length + ' part' + (children.length === 1 ? '' : 's') + '</span>' : ''}</div>
              <div class="editor-summary">${escapeHtml(summary)}</div>
            </div>
            <div class="mini-actions">
              <button class="mini-btn" onclick="toggleQuestionCollapse(${index})">${collapsed ? 'Expand' : 'Collapse'}</button>
              <button class="mini-btn" onclick="moveQuestion(${index}, -1)" ${index === 0 ? 'disabled' : ''}>Up</button>
              <button class="mini-btn" onclick="moveQuestion(${index}, 1)" ${index === (state.currentData.meta.questions || []).length - 1 ? 'disabled' : ''}>Down</button>
              <button class="mini-btn" onclick="duplicateQuestion(${index})">Duplicate</button>
              <button class="mini-btn delete" onclick="removeQuestion(${index})">Remove</button>
            </div>
          </div>
          <div class="editor-card-body">
            <div class="field">
              <label>Question Prompt</label>
              <textarea class="text-area wq-question" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.question || '')}</textarea>
              ${children.length ? '<small class="muted">Parent prompt shared by all parts. Each part has its own question and model answer below.</small>' : ''}
            </div>
            <div class="field">
              <label>Model Answer ${children.length ? '<span class="muted" style="font-weight:400;">(parent fallback — used when a part has no model answer)</span>' : ''}</label>
              <textarea class="text-area wq-model-answer" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.modelAnswer || question.answer || '')}</textarea>
            </div>
            <div class="field">
              <label>Rubric (optional)</label>
              <textarea class="text-area wq-rubric" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.rubric || '')}</textarea>
              <small>Grading guidance for AI evaluation.</small>
            </div>
            <div class="field">
              <label>Explanation (optional)</label>
              <textarea class="text-area wq-explanation" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.explanation || '')}</textarea>
            </div>
            <div class="field">
              <label>Tags (comma-separated)</label>
              <input class="text-input wq-tags" data-index="${index}" value="${escapeHtml(tags)}" oninput="syncQuizBankEditor()" placeholder="e.g. biology, respiration">

            <div class="field" style="border-top:1px dashed var(--border); padding-top:0.75rem; margin-top:0.5rem;">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
                <label style="margin:0;">Sub-parts ${children.length ? '<span class="muted" style="font-weight:400;">(multi-part question)</span>' : ''}</label>
                <div class="mini-actions">
                  ${convertBtn}

                </div>
              </div>
              ${children.length
                ? childrenHtml
                : '<small class="muted">No sub-parts. Use "Convert to Multi-part" to split this question into parts (A, B, C…) each with its own model answer.</small>'

          </div>

              ${pq.map((qItem, qi) => `

                  <div class="field" style="margin-bottom:0.35rem;">
                    <label style="font-size:0.7rem;font-weight:600;">Question</label>
                    <textarea class="text-area osce-pq-question" data-index="${index}" data-pqidx="${qi}" oninput="syncQuizBankEditor()" style="min-height:50px;font-size:0.75rem;">${escapeHtml(qItem.question || '')}</textarea>

                  <div class="field" style="margin-bottom:0.35rem;">
                    <label style="font-size:0.7rem;font-weight:600;">Model Answer</label>
                    <textarea class="text-area osce-pq-answer" data-index="${index}" data-pqidx="${qi}" oninput="syncQuizBankEditor()" style="min-height:40px;font-size:0.75rem;">${escapeHtml(qItem.answer || '')}</textarea>

                    <textarea class="text-area osce-pq-rubric" data-index="${index}" data-pqidx="${qi}" oninput="syncQuizBankEditor()" style="min-height:40px;font-size:0.75rem;">${escapeHtml(qItem.rubric || '')}</textarea>

              <button class="mini-btn" onclick="_osceAddPq(${index})">+ Add Question</button>

            <div style="border-top:1px solid var(--border); margin:0.75rem 0; padding-top:0.75rem;">

                    <option value="female" ${patient.gender==='female'?'selected':''}>Female</option>
                    <option value="other" ${patient.gender==='other'?'selected':''}>Other</option>
                  </select>

                <div class="field">
                  <label>Avatar Seed</label>
                  <input class="text-input osce-patient-avatar" data-index="${index}" value="${escapeHtml(patient.avatarSeed || '')}" oninput="syncQuizBankEditor()" placeholder="robert-hayes">

              <div class="field full">
                <label>Opening Line</label>
                <textarea class="text-area osce-patient-opening" data-index="${index}" oninput="syncQuizBankEditor()" style="min-height:60px;">${escapeHtml(patient.opening || '')}</textarea>
              </div>
            </div>

            <div style="border-top:1px solid var(--border); margin:0.75rem 0; padding-top:0.75rem;">
              <div style="font-weight:700; font-size:0.85rem; color:var(--accent); margin-bottom:0.5rem;">Hidden Profile <span class="muted" style="font-weight:400;">(ground truth — never shown to students)</span></div>

                <label>Diagnosis</label>
                <input class="text-input osce-hp-diagnosis" data-index="${index}" value="${escapeHtml(hiddenProfile.diagnosis || '')}" oninput="syncQuizBankEditor()">

                <input class="text-input osce-hp-symptoms" data-index="${index}" value="${escapeHtml(keySymptoms.join(', '))}" oninput="syncQuizBankEditor()">

                <input class="text-input osce-hp-history" data-index="${index}" value="${escapeHtml(pastHistory.join(', '))}" oninput="syncQuizBankEditor()">
              </div>
              <div class="field full">
                <label>Vital Signs</label>
                <input class="text-input osce-hp-vitals" data-index="${index}" value="${escapeHtml(hiddenProfile.vitalSigns || '')}" oninput="syncQuizBankEditor()">

            <div style="border-top:1px solid var(--border); margin:0.75rem 0; padding-top:0.75rem;">

              <div class="field full">
                <label>Bonus Items <span class="muted">(one per line, optional)</span></label>

    function renderQuestionCard(question, index) {
      const isFlashcard = state.currentData?.meta?.type === 'flashcard';
      const isWritten = state.currentData?.meta?.type === 'written';
      const isOsce = state.currentData?.meta?.type === 'osce';
      if (isOsce) {
        return renderOsceCaseCard(question, index);
      }
      if (isWritten) {
        return renderWrittenQuestionCard(question, index);
      }
      if (isFlashcard) {
        const collapsed = state.collapsedQuestions.has(index);
        const summary = `${(question.front || 'Untitled card').slice(0, 90)}${(question.front || '').length > 90 ? '…' : ''}`;
        const tags = Array.isArray(question.tags) ? question.tags.join(', ') : (typeof question.tags === 'string' ? question.tags : '');
        return `
          <div class="editor-card ${collapsed ? 'collapsed' : ''}" data-qidx="${index}">
            <div class="editor-card-header">
              <div>
                <div class="editor-card-title">Card ${index + 1}</div>
                <div class="editor-summary">${escapeHtml(summary)}</div>
              </div>
              <div class="mini-actions">
                <button class="mini-btn" onclick="toggleQuestionCollapse(${index})">${collapsed ? 'Expand' : 'Collapse'}</button>
                <button class="mini-btn" onclick="moveQuestion(${index}, -1)" ${index === 0 ? 'disabled' : ''}>Up</button>
                <button class="mini-btn" onclick="moveQuestion(${index}, 1)" ${index === (state.currentData.meta.questions || []).length - 1 ? 'disabled' : ''}>Down</button>
                <button class="mini-btn" onclick="duplicateQuestion(${index})">Duplicate</button>
                <button class="mini-btn delete" onclick="removeQuestion(${index})">Remove</button>
              </div>
            </div>
            <div class="editor-card-body">
              <div class="field">
                <label>Card Type</label>
                <select class="text-input q-card-type" data-index="${index}" onchange="syncQuizBankEditor()" style="width:auto;">
                  <option value="basic" ${(question.type||'basic')==='basic'?'selected':''}>Basic (Front + Back)</option>
                  <option value="cloze" ${question.type==='cloze'?'selected':''}>Cloze (Fill in blank)</option>
                </select>
              </div>
              <div class="field">
                <label>Front${question.type==='cloze'?' / Cloze text (use {{c1::blank}} syntax)':''}</label>
                <textarea class="text-area q-front" data-index="${index}" oninput="syncQuizBankEditor()" placeholder="${question.type==='cloze'?'The {{c1::capital}} of France is {{c2::Paris}}':'Enter the front of the card'}">${escapeHtml(question.front || question.text || '')}</textarea>
              </div>
              <div class="field">
                <label>Back${question.type==='cloze'?' / Extra notes':''}</label>
                <textarea class="text-area q-back" data-index="${index}" oninput="syncQuizBankEditor()" placeholder="${question.type==='cloze'?'Extra explanation or notes for this cloze deletion':'Enter the back of the card'}">${escapeHtml(question.back || question.extra || '')}</textarea>
              </div>
              <div class="field">
                <label>Tags (comma-separated)</label>
                <input class="text-input q-tags" data-index="${index}" value="${escapeHtml(tags)}" oninput="syncQuizBankEditor()" placeholder="e.g. anatomy, heart">
              </div>
            </div>
          </div>
        `;
      }
      const options = question.options || ['', '', '', ''];
      const collapsed = state.collapsedQuestions.has(index);
      const summary = `${(question.question || 'Untitled question').slice(0, 90)}${(question.question || '').length > 90 ? '…' : ''}`;
      return `
        <div class="editor-card ${collapsed ? 'collapsed' : ''}" data-qidx="${index}">
          <div class="editor-card-header">
            <div>
              <div class="editor-card-title">Question ${index + 1}</div>
              <div class="editor-summary">${escapeHtml(summary)}</div>
            </div>
            <div class="mini-actions">
              <button class="mini-btn" onclick="toggleQuestionCollapse(${index})">${collapsed ? 'Expand' : 'Collapse'}</button>
              <button class="mini-btn" onclick="moveQuestion(${index}, -1)" ${index === 0 ? 'disabled' : ''}>Up</button>
              <button class="mini-btn" onclick="moveQuestion(${index}, 1)" ${index === (state.currentData.meta.questions || []).length - 1 ? 'disabled' : ''}>Down</button>
              <button class="mini-btn" onclick="duplicateQuestion(${index})">Duplicate</button>
              <button class="mini-btn delete" onclick="removeQuestion(${index})">Remove Q</button>
            </div>
          </div>
          <div class="editor-card-body">
            <div class="field">
              <label>Question</label>
              <textarea class="text-area q-question" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.question || '')}</textarea>
            </div>
            <div class="field">
              <label>Options</label>
              <div class="option-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                ${options.map((option, optionIndex) => `
                  <div class="option-row" style="display: flex; align-items: center; gap: 0.4rem;">
                    <input type="radio" name="correct-${index}" value="${optionIndex}" ${question.correct === optionIndex ? 'checked' : ''} onchange="syncQuizBankEditor()">
                    <input class="text-input q-option" data-index="${index}" data-option="${optionIndex}" value="${escapeHtml(option)}" oninput="syncQuizBankEditor()" placeholder="Option ${String.fromCharCode(65 + optionIndex)}" style="flex:1;">
                    ${options.length > 2 ? `<button class="mini-btn delete" onclick="removeOption(${index}, ${optionIndex})" title="Remove Option">×</button>` : ''}
                  </div>
                `).join('')}
                <button class="mini-btn" onclick="addOption(${index})" style="grid-column: span 2; border-style: dashed; margin-top: 0.25rem;">+ Add Option</button>
              </div>
            </div>
            <div class="field">
              <label>Explanation</label>
              <textarea class="text-area q-explanation" data-index="${index}" oninput="syncQuizBankEditor()">${escapeHtml(question.explanation || '')}</textarea>
            </div>
          </div>
        </div>
      `;
    }

    function renderIndexEditor(meta) {
      const quizzes = meta.quizzes || [];
      return `
        <div class="editor-grid">
          <div class="field-grid">
            <div class="field">
              <label>Page Title</label>
              <input class="text-input" id="index-title" value="${escapeHtml(meta.title || '')}" oninput="syncIndexEditor()">
            </div>
            <div class="field">
              <label>Hero Title</label>
              <input class="text-input" id="index-hero-title" value="${escapeHtml(meta.hero_title || '')}" oninput="syncIndexEditor()">
              <small>HTML is allowed here, for example <code>Select your &lt;span&gt;Gynecology exam&lt;/span&gt;</code>.</small>

    function onRawInput() {
      if (!state.currentData) return;
      state.currentData.content = document.getElementById('raw-html').value;
      setDirty(true);
      setSyncState('needs-sync', 'Raw HTML changed. Save and sync when ready.');
      scheduleValidation();
    }

    function replaceAssignedBlock(html, constName, openChar, closeChar, value) {
      const openPattern = new RegExp(`(const|let|var)\\s+${constName}\\s*=\\s*\\${openChar}`);
      const match = html.match(openPattern);
      if (!match) return html;
      const startIdx = html.indexOf(match[0]);
      const blockStart = startIdx + match[0].length - 1;
      let depth = 0;
      let endIdx = -1;
      for (let i = blockStart; i < html.length; i += 1) {
        if (html[i] === openChar) depth += 1;
        else if (html[i] === closeChar) {
          depth -= 1;
          if (depth === 0) {
            endIdx = i;
            break;
          }
        }
      }
      if (endIdx === -1) return html;
      const serialized = JSON.stringify(value, null, 2);
      return `${html.slice(0, startIdx)}${match[1]} ${constName} = ${serialized}${html.slice(endIdx + 1)}`;
    }

    function updateRawAndMeta() {
      const raw = document.getElementById('raw-html');
      const metadataPanel = document.querySelector('#tab-metadata textarea');
      if (raw) raw.value = state.currentData.content;
      if (metadataPanel) metadataPanel.value = JSON.stringify(state.currentData.meta, null, 2);
      setDirty(true);
      setSyncState('needs-sync', 'Local edits updated. Save when ready, then run sync for generated assets.');
      scheduleValidation();
    }

    function _osceAddImage(index) {
      const input = document.getElementById('osce-file-' + index);
      if (!input) return;
      input.value = '';
      input.onchange = function () {
        const files = Array.from(input.files);
        if (!files.length) return;
        const questions = state.currentData?.meta?.questions;
        if (!questions || !questions[index]) return;
        const caseItem = questions[index];
        if (!caseItem.dataPresented) caseItem.dataPresented = { images: [] };
        if (!Array.isArray(caseItem.dataPresented.images)) caseItem.dataPresented.images = [];
        let loaded = 0;
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = function (e) {
            caseItem.dataPresented.images.push({
              src: e.target.result,
              title: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
              caption: '',
              alt: file.name,
            });
            loaded++;
            if (loaded === files.length) {
              renderFilePanel();
              setTab('editor');
              syncQuizBankEditor();
            }
          };
          reader.readAsDataURL(file);
        });
      };
      input.click();
    }

      const questions = state.currentData?.meta?.questions;
      if (!questions || !questions[caseIdx]) return;
      const caseItem = questions[caseIdx];

        caseItem.dataPresented.images.splice(imgIdx, 1);

        setTab('editor');
        syncQuizBankEditor();

    function _osceRemoveTable(caseIdx, tableIdx) {

    function scheduleValidation() {
      window.clearTimeout(state.validationTimer);

    let _editorDebounceTimer;

    function syncQuizBankEditor() {
      if (!state.currentData) return;
      const meta = state.currentData.meta;
      const isFlashcard = meta.type === 'flashcard';
      const isWritten = meta.type === 'written';
      const isOsce = meta.type === 'osce';
      const uid = document.getElementById('cfg-uid')?.value || '';
      const title = document.getElementById('cfg-title')?.value || '';
      const description = document.getElementById('cfg-description')?.value || '';
      const icon = document.getElementById('cfg-icon')?.value || (isFlashcard ? '🃏' : isWritten ? '✍️' : isOsce ? '🩺' : '🗃️');
      const cards = Array.from(document.querySelectorAll('.editor-card'));
      let questions;
      if (isOsce) {
        questions = cards.map((card, index) => {
          const id = card.querySelector('.osce-id')?.value || '';
          const caseTitle = card.querySelector('.osce-title')?.value || '';
          const specialty = card.querySelector('.osce-specialty')?.value || '';
          const difficulty = card.querySelector('.osce-difficulty')?.value || 'Intermediate';
          const caseType = card.querySelector('.osce-type')?.value || 'history';
          const caseTime = parseInt(card.querySelector('.osce-time')?.value) || 480;
          const task = card.querySelector('.osce-task')?.value || '';
          const examinerName = card.querySelector('.osce-examiner-name')?.value || '';
          const examinerTitle = card.querySelector('.osce-examiner-title')?.value || '';
          const scenario = card.querySelector('.osce-scenario')?.value || '';
          const pName = card.querySelector('.osce-patient-name')?.value || '';
          const pAge = parseInt(card.querySelector('.osce-patient-age')?.value) || 0;
          const pGender = card.querySelector('.osce-patient-gender')?.value || 'male';
          const pAvatar = card.querySelector('.osce-patient-avatar')?.value || '';
          const pOpening = card.querySelector('.osce-patient-opening')?.value || '';
          const hpDiagnosis = card.querySelector('.osce-hp-diagnosis')?.value || '';
          const hpSymptoms = (card.querySelector('.osce-hp-symptoms')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
          const hpRedFlags = (card.querySelector('.osce-hp-redflags')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
          const hpHistory = (card.querySelector('.osce-hp-history')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
          const hpVitals = card.querySelector('.osce-hp-vitals')?.value || '';
          const rubricMustAsk = (card.querySelector('.osce-rubric-mustask')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
          const rubricBonus = (card.querySelector('.osce-rubric-bonus')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
          // Tables
          const tableEls = Array.from(card.querySelectorAll('.osce-table-title[data-index="' + index + '"]'));
          const tables = tableEls.map((_, ti) => {
            const title = card.querySelector('.osce-table-title[data-index="' + index + '"][data-tableidx="' + ti + '"]')?.value || '';
            const headersStr = card.querySelector('.osce-table-headers[data-index="' + index + '"][data-tableidx="' + ti + '"]')?.value || '';
            const rowsStr = card.querySelector('.osce-table-rows[data-index="' + index + '"][data-tableidx="' + ti + '"]')?.value || '';
            const headers = headersStr.split(',').map(s => s.trim()).filter(Boolean);
            const rows = rowsStr.split('\n').map(line => line.trim()).filter(Boolean).map(line => line.split('\t').map(s => s.trim()));
            return { title, headers, rows };
          });
          // Images
          const imgThumbs = Array.from(card.querySelectorAll('.osce-image-thumb'));
          const images = imgThumbs.map((thumb) => {
            const src = thumb.querySelector('.osce-img-src')?.value || '';
            const title = thumb.querySelector('.osce-img-title')?.value || '';
            const caption = thumb.querySelector('.osce-img-caption')?.value || '';
            return { src, title, caption, alt: caption || title || 'Clinical image' };
          }).filter(img => img.src);
          // Post-encounter questions
          const pqEls = Array.from(card.querySelectorAll('.osce-pq-question[data-index="' + index + '"]'));
          const pq = pqEls.map((_, qi) => {
            const question = card.querySelector('.osce-pq-question[data-index="' + index + '"][data-pqidx="' + qi + '"]')?.value || '';
            const answer = card.querySelector('.osce-pq-answer[data-index="' + index + '"][data-pqidx="' + qi + '"]')?.value || '';
            const rubric = card.querySelector('.osce-pq-rubric[data-index="' + index + '"][data-pqidx="' + qi + '"]')?.value || '';
            return { question, answer, rubric };
          }).filter(q => q.question);
          const result = {
            id: id || 'case-' + String(index + 1).padStart(3, '0'),
            title: caseTitle,
            type: caseType,
            specialty,
            difficulty,
            time: caseTime,
            task: task || undefined,
            examiner: (examinerName || examinerTitle) ? { name: examinerName || undefined, title: examinerTitle || undefined } : undefined,
            patient: { name: pName, age: pAge, gender: pGender, avatarSeed: pAvatar, opening: pOpening },
            hiddenProfile: {
              diagnosis: hpDiagnosis,
              keySymptoms: hpSymptoms,
              redFlags: hpRedFlags,
              pastHistory: hpHistory,
              vitalSigns: hpVitals,
            },
            rubric: {
              mustAsk: rubricMustAsk,
              bonus: rubricBonus,
            },
          };
          const dp = {};
          if (scenario) dp.scenario = scenario;
          if (tables.length) dp.tables = tables;
          if (images.length) dp.images = images;
          if (Object.keys(dp).length) result.dataPresented = dp;
          if (pq.length) result.questions = pq;
          return result;
        });
      } else if (isWritten) {
        questions = cards.map((card) => {
          const q = card.querySelector('.wq-question')?.value || '';
          const modelAnswer = card.querySelector('.wq-model-answer')?.value || '';
          const rubric = card.querySelector('.wq-rubric')?.value || '';
          const explanation = card.querySelector('.wq-explanation')?.value || '';
          const tagsStr = card.querySelector('.wq-tags')?.value || '';
          const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
          const entry = { question: q, modelAnswer, rubric, explanation, tags };
          // Read children (multi-part) if present in the DOM
          const childRows = Array.from(card.querySelectorAll('.child-editor-card'));
          if (childRows.length) {
            entry.children = childRows.map((row) => {
              const label = row.querySelector('.wq-child-label')?.value?.trim() || '';
              const childQ = row.querySelector('.wq-child-question')?.value || '';
              const childModel = row.querySelector('.wq-child-model-answer')?.value || '';
              const childRubric = row.querySelector('.wq-child-rubric')?.value || '';
              const childExpl = row.querySelector('.wq-child-explanation')?.value || '';
              const child = { label, question: childQ, modelAnswer: childModel };
              if (childRubric) child.rubric = childRubric;
              if (childExpl) child.explanation = childExpl;
              return child;
            });
          }
          return entry;
        });
      } else if (isFlashcard) {
        questions = cards.map((card, index) => {
          const cardType = card.querySelector('.q-card-type')?.value || 'basic';
          const front = card.querySelector('.q-front')?.value || '';
          const back = card.querySelector('.q-back')?.value || '';
          const tagsStr = card.querySelector('.q-tags')?.value || '';
          const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
          return { type: cardType, front, back, tags };
        });
        const customScript = document.getElementById('cfg-custom-script')?.value || '';
        meta.customScript = customScript;
      } else {
        questions = cards.map((card, index) => {
          const questionText = card.querySelector('.q-question')?.value || '';
          const options = Array.from(card.querySelectorAll('.q-option')).map(input => input.value || '');
          const checked = card.querySelector(`input[name="correct-${index}"]:checked`);
          const correct = checked ? Number(checked.value) : 0;
          const explanation = card.querySelector('.q-explanation')?.value || '';
          return { question: questionText, options, correct, explanation };
        });
      }
      meta.config = meta.config || {};
      meta.config.uid = uid;
      meta.config.title = title;
      meta.config.description = description;
      if (meta.type === 'bank' || meta.type === 'flashcard' || meta.type === 'written' || meta.type === 'osce') meta.config.icon = icon;
      meta.uid = uid;
      meta.title = title;
      meta.description = description;
      meta.icon = (meta.type === 'bank' || meta.type === 'flashcard' || meta.type === 'written' || meta.type === 'osce') ? icon : undefined;
      meta.questions = questions;
      meta.question_count = questions.length;
      // Debounce the expensive serialization + content string rebuild
      clearTimeout(_editorDebounceTimer);
      _editorDebounceTimer = setTimeout(() => {
        if (!state.currentData) return;
        const isFC = meta.type === 'flashcard';
        const isWR = meta.type === 'written';
        const isOC = meta.type === 'osce';
        const configName = isFC ? 'BANK_CONFIG' : (isWR ? 'WRITTEN_CONFIG' : (isOC ? 'OSCE_CONFIG' : (meta.type === 'bank' ? 'BANK_CONFIG' : 'QUIZ_CONFIG')));
        let updated = state.currentData.content;
        updated = replaceAssignedBlock(updated, configName, '{', '}', meta.config);
        // OSCE supports two formats: singular OSCE_CASE = { ... } (1 case per file,
        // used by generated projects) and plural OSCE_CASES = [ ... ] (multi-case).
        // Detect which format the file uses and preserve it.
        if (isOC) {
          const hasSingular = /(?:const|let|var)\s+OSCE_CASE\s*=/.test(updated);
          const hasPlural = /(?:const|let|var)\s+OSCE_CASES\s*=/.test(updated);
          if (hasSingular && !hasPlural && questions.length === 1) {
            // Singular format: const OSCE_CASE = { ... }
            updated = replaceAssignedBlock(updated, 'OSCE_CASE', '{', '}', questions[0]);
            // Update the marker comment to OSCE_CASE
            updated = updated.replace(/\/\*\s*\[OSCE_CASES_START\]\s*\*\//g, '/* [OSCE_CASE_START] */');
            updated = updated.replace(/\/\*\s*\[OSCE_CASES_END\]\s*\*\//g, '/* [OSCE_CASE_END] */');
          } else {
            // Plural format: const OSCE_CASES = [ ... ]
            const arrayName = isFC ? 'FLASHCARD_BANK' : (isWR ? 'WRITTEN_QUESTIONS' : (isOC ? 'OSCE_CASES' : (meta.type === 'bank' ? 'QUESTION_BANK' : 'QUESTIONS')));
            updated = replaceAssignedBlock(updated, 'OSCE_CASES', '[', ']', questions);
            // Update the marker comment to OSCE_CASES
            updated = updated.replace(/\/\*\s*\[OSCE_CASE_START\]\s*\*\//g, '/* [OSCE_CASES_START] */');
            updated = updated.replace(/\/\*\s*\[OSCE_CASE_END\]\s*\*\//g, '/* [OSCE_CASES_END] */');
          }
        } else {
          const arrayName = isFC ? 'FLASHCARD_BANK' : (isWR ? 'WRITTEN_QUESTIONS' : (isOC ? 'OSCE_CASES' : (meta.type === 'bank' ? 'QUESTION_BANK' : 'QUESTIONS')));
          updated = replaceAssignedBlock(updated, arrayName, '[', ']', questions);
        }
        if (isFC) {
          const customScript = meta.customScript || '';
          const scStart = '/* [CUSTOM_SCRIPT_START] */';
          const scEnd = '/* [CUSTOM_SCRIPT_END] */';
          const scBlock = scStart + '\n' + customScript + '\n' + scEnd;
          if (updated.includes(scStart)) {
            const si = updated.indexOf(scStart);
            const ei = updated.indexOf(scEnd, si);
            if (ei !== -1) {
              updated = updated.substring(0, si) + scBlock + updated.substring(ei + scEnd.length);
            }
          } else {
            // Insert before the engine loader
            updated = updated.replace(
              '</scr' + 'ipt>\n<script>\n(function(){\n  window.__FLASHCARD_ENGINE_BASE',
              scBlock + '\n</scr' + 'ipt>\n<script>\n(function(){\n  window.__FLASHCARD_ENGINE_BASE'
            );
          }
        }
        state.currentData.content = updated;
        updateRawAndMeta();
      }, 200);
    }

    function syncIndexEditor() {
      if (!state.currentData) return;
      const meta = state.currentData.meta;
      const title = document.getElementById('index-title')?.value || '';
      const heroTitle = document.getElementById('index-hero-title')?.value || '';
      const description = document.getElementById('index-description')?.value || '';
      const cards = Array.from(document.querySelectorAll('.editor-card')).map(card => {
        const cardTitle = card.querySelector('.idx-title')?.value || '';
        const cardDescription = card.querySelector('.idx-description')?.value || '';
        const cardUrl = card.querySelector('.idx-url')?.value || '';
        const cardIcon = card.querySelector('.idx-icon')?.value || '';
        const tags = (card.querySelector('.idx-tags')?.value || '')
          .split(',')
          .map(tag => tag.trim())
          .filter(Boolean);
        const entry = { title: cardTitle, description: cardDescription, url: cardUrl };
        if (cardIcon) entry.icon = cardIcon;
        if (tags.length) entry.tags = tags;
        return entry;
      });
      meta.title = title;
      meta.hero_title = heroTitle;
      meta.description = description;
      meta.quizzes = cards;
      meta.question_count = cards.length;
      clearTimeout(_editorDebounceTimer);
      _editorDebounceTimer = setTimeout(() => {
        if (!state.currentData) return;
        let updated = state.currentData.content;
        updated = replaceAssignedBlock(updated, 'QUIZZES', '[', ']', cards);
        if (title) {
          updated = updated.replace(/<title>[\s\S]*?<\/title>/i, `<title>${escapeHtml(title)}</title>`);
          updated = updated.replace(/<div class="topbar-title">[\s\S]*?<\/div>/i, `<div class="topbar-title">${escapeHtml(title)}</div>`);
        }
        const heroPattern = /<header class="hero">[\s\S]*?<\/header>/i;
        if (heroPattern.test(updated)) {
          updated = updated.replace(
            heroPattern,
            `<header class="hero">\n      <h1>${heroTitle}</h1>\n      <p>${escapeHtml(description)}</p>\n    </header>`
          );
        }
        state.currentData.content = updated;
        updateRawAndMeta();
      }, 200);
    }

    function toggleQuestionCollapse(index) {
      if (state.collapsedQuestions.has(index)) {
        state.collapsedQuestions.delete(index);
      } else {
        state.collapsedQuestions.add(index);
      }
      const card = document.querySelector(`.editor-card[data-qidx="${index}"]`);
      if (card) {
        card.classList.toggle('collapsed', state.collapsedQuestions.has(index));
      } else {
        renderFilePanel();
        setTab('editor');
      }
    }

    function collapseAllQuestions() {
      const count = state.currentData?.meta?.questions?.length || 0;
      state.collapsedQuestions = new Set(Array.from({ length: count }, (_value, index) => index));
      document.querySelectorAll('.editor-card').forEach(card => card.classList.add('collapsed'));
    }

    function expandAllQuestions() {
      state.collapsedQuestions = new Set();
      document.querySelectorAll('.editor-card').forEach(card => card.classList.remove('collapsed'));
    }

    function moveQuestion(index, delta) {
      const list = state.currentData?.meta?.questions;
      if (!list) return;
      const next = index + delta;
      if (next < 0 || next >= list.length) return;
      [list[index], list[next]] = [list[next], list[index]];
      renderFilePanel();
      setTab('editor');
      syncQuizBankEditor();
    }

    function duplicateQuestion(index) {
      const list = state.currentData?.meta?.questions;
      if (!list) return;
      list.splice(index + 1, 0, clone(list[index]));
      renderFilePanel();
      setTab('editor');
      syncQuizBankEditor();
    }

    function removeQuestion(index) {
      const list = state.currentData?.meta?.questions;
      if (!list) return;
      list.splice(index, 1);
      renderFilePanel();
      setTab('editor');
      syncQuizBankEditor();
    }

    function addQuestion() {
      const list = state.currentData?.meta?.questions;
      if (!list) return;
      const isFlashcard = state.currentData?.meta?.type === 'flashcard';
      const isWritten = state.currentData?.meta?.type === 'written';
      const isOsce = state.currentData?.meta?.type === 'osce';
      list.push(isFlashcard
        ? { type: 'basic', front: '', back: '', tags: [] }
        : isOsce
          ? { id: 'case-' + String(list.length + 1).padStart(3, '0'), title: '', type: 'history', specialty: '', difficulty: 'Intermediate', time: 480, task: '', examiner: {}, patient: { name: '', age: 0, gender: 'male', avatarSeed: '', opening: '' }, hiddenProfile: { diagnosis: '', keySymptoms: [], redFlags: [], pastHistory: [], vitalSigns: '' }, rubric: { mustAsk: [], bonus: [] }, dataPresented: { scenario: '', tables: [], images: [] }, questions: [] }
          : isWritten
            ? { id: 'wq-' + Date.now().toString(36) + '-' + (list.length + 1), question: '', modelAnswer: '', rubric: '', explanation: '', tags: [] }
            : { question: '', options: ['', '', '', ''], correct: 0, explanation: '' }
      );
      renderFilePanel();
      setTab('editor');
      syncQuizBankEditor();
    }

    // ── Written multi-part (children) helpers ───────────────────────────────
    function _ensureChildren(qIdx) {
      const list = state.currentData?.meta?.questions;
      if (!list || !list[qIdx]) return null;
      const q = list[qIdx];
      if (!Array.isArray(q.children)) q.children = [];
      return q;
    }

    function _rerenderEditorAndSync() {
      renderFilePanel();
      setTab('editor');
      syncQuizBankEditor();
    }

    function addChildPart(qIdx) {
      const q = _ensureChildren(qIdx);
      if (!q) return;
      q.children.push({ label: childLetter(q.children.length), question: '', modelAnswer: '', rubric: '', explanation: '' });
      _rerenderEditorAndSync();
    }

    function removeChildPart(qIdx, cIdx) {
      const q = _ensureChildren(qIdx);
      if (!q || !q.children[cIdx]) return;
      q.children.splice(cIdx, 1);
      // Re-letter labels so A/B/C… stays sequential unless user customized them
      q.children.forEach((child, ci) => {
        const def = childLetter(ci);
        // Only auto-reletter if the label still matches a default pattern
        if (/^[A-Z]\)$/.test(child.label || '') || !child.label) child.label = def;
      });
      _rerenderEditorAndSync();
    }

    function moveChildPart(qIdx, cIdx, delta) {
      const q = _ensureChildren(qIdx);
      if (!q || !q.children[cIdx]) return;
      const next = cIdx + delta;
      if (next < 0 || next >= q.children.length) return;
      const tmp = q.children[cIdx];
      q.children[cIdx] = q.children[next];
      q.children[next] = tmp;
      _rerenderEditorAndSync();
    }

    function duplicateChildPart(qIdx, cIdx) {
      const q = _ensureChildren(qIdx);
      if (!q || !q.children[cIdx]) return;
      const copy = clone(q.children[cIdx]);
      q.children.splice(cIdx + 1, 0, copy);
      _rerenderEditorAndSync();
    }

    function convertToMultiPart(qIdx) {
      const q = _ensureChildren(qIdx);
      if (!q) return;
      if (q.children.length) return; // already multi-part
      q.children.push({ label: 'A)', question: '', modelAnswer: '', rubric: '', explanation: '' });
      _rerenderEditorAndSync();
    }

    }

    }

    async function saveFile({ quiet = false, confirmUidChange = false } = {}) {
      if (!state.currentFile || !state.currentData) {
        showToast('No file is loaded.', 'warn');
        return false;
      }
      const raw = document.getElementById('raw-html');
      const content = raw ? raw.value : state.currentData.content;
      try {
        const result = await fetchJson('/admin/save-file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: state.currentFile, content, confirm_uid_change: confirmUidChange }),
        });
        state.currentData.content = content;
        setDirty(false);
        setSyncState('needs-sync', 'File saved locally. Run sync to refresh generated indexes and assets.');
        if (!quiet) showToast(result.message || 'File saved.', 'success');
        logActivity('Saved file', state.currentFile, 'success');
        const validation = await validateCurrentFile({ silent: true });
        if (validation?.meta) {
          state.currentData.meta = clone(validation.meta);
          state.loadedMeta = clone(validation.meta);
        }
        return true;
      } catch (error) {
        if (error.payload?.validation) {
          state.validation = error.payload.validation;
          renderFilePanel();
        }
        if (String(error.message || '').includes('UID change requires confirmation') && !confirmUidChange) {
          openModal({
            title: 'Confirm UID Change',
            subtitle: 'Changing a deployed UID can orphan learner progress and tracker history.',
            body: `
              <div class="empty-state" style="text-align:left;">
                Save this file anyway with the new UID?
              </div>
              <div class="modal-actions">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="closeModal(); saveFile({ confirmUidChange: true })">Save with New UID</button>
              </div>
            `,
          });
          return false;
        }
        showToast(error.message || 'Save failed.', 'error');
        return false;
      }
    }

    let _syncDebounceTimer = null;

    function scheduleSync() {
      if (_syncDebounceTimer) clearTimeout(_syncDebounceTimer);
      setSyncState('needs-sync', 'Sync pending...');
      _syncDebounceTimer = setTimeout(async () => {
        _syncDebounceTimer = null;
        await runSync({ silentToast: true, preserveCurrent: false });
      }, 2000);
    }

    async function runSync({ silentToast = false, preserveCurrent = true } = {}) {
      if (state.dirty) {
        showToast('Save the current file before running sync.', 'warn');
        return false;
      }
      if (_syncDebounceTimer) {
        clearTimeout(_syncDebounceTimer);
        _syncDebounceTimer = null;
      }
      setSyncState('syncing', 'Running sync script...');
      try {
        const result = await fetchJson('/admin/run-sync', { method: 'POST' });
        setSyncState(result.returncode === 0 ? 'saved' : 'sync-failed', result.message || 'Sync completed.');
        if (!silentToast) showToast(result.message || 'Sync completed.', result.returncode === 0 ? 'success' : 'warn');
        logActivity('Sync completed', result.output || result.stderr || 'No output.', result.returncode === 0 ? 'success' : 'warn');
        await refreshWorkspace({ preserveCurrent });
        return result.returncode === 0;
      } catch (err) {
        // Sync may fail if Python is not installed — this must NOT block file creation/save flows.
        setSyncState('sync-failed', err.message || 'Sync failed.');
        if (!silentToast) showToast((err.message || 'Sync failed.') + ' The file was saved successfully.', 'warn');
        logActivity('Sync failed', err.message || 'Unknown error', 'error');
        await refreshWorkspace({ preserveCurrent });
        return false;
      }
    }

              <div class="modal-actions" style="margin-top:2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">

                <button class="btn" onclick="addModalQuestion()">Add Question</button>
