# Build the Tauri Desktop EXE on release tags and attach to GitHub Release
name: Build Tauri Release

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag for manual build (leave empty to use latest commit)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri"

      - name: Install WebView2 (pre-installed on windows-latest)
        run: echo "WebView2 is pre-installed on GitHub Actions Windows runners."

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify binary exists
        run: |
          if (-Not (Test-Path "target/release/quiztool-tauri.exe")) {
            Write-Error "Binary not found at target/release/quiztool-tauri.exe"
            exit 1
          }
          Write-Host "Binary size: $((Get-Item "target/release/quiztool-tauri.exe").Length / 1KB) KB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-windows-x86_64
          path: tauri/target/release/quiztool-tauri.exe
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: tauri/target/release/quiztool-tauri.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (x86_64)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri"

      - name: Install system dependencies
        run: |
          brew install webkit2gtk-4.1 2>/dev/null || true
          brew install libappindicator-gtk3 2>/dev/null || true

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/quiztool-tauri" ]; then
            echo "Binary not found at target/release/quiztool-tauri"
            exit 1
          fi
          echo "Binary size: $(du -h target/release/quiztool-tauri | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-macos-x86_64
          path: tauri/target/release/quiztool-tauri
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: tauri/target/release/quiztool-tauri
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri"

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip debug symbols
        run: strip target/release/quiztool-tauri

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/quiztool-tauri" ]; then
            echo "Binary not found at target/release/quiztool-tauri"
            exit 1
          fi
          echo "Binary size: $(du -h target/release/quiztool-tauri | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-linux-x86_64
          path: tauri/target/release/quiztool-tauri
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: tauri/target/release/quiztool-tauri
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-summary:
    name: Release Summary
    needs: [build-windows, build-macos, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Generate build matrix summary
        run: |
          echo "## 🏗️ Tauri Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows x86_64 | ${{ needs.build-windows.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-windows-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS x86_64 | ${{ needs.build-macos.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-macos-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux x86_64 | ${{ needs.build-linux.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-linux-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: **${{ github.ref_type }}** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY