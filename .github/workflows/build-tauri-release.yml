# Build the Tauri Desktop EXEs on release tags and attach to GitHub Release
name: Build Tauri Release

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag for manual build (leave empty to use latest commit)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x86_64) - ${{ matrix.app }}
    runs-on: windows-latest
    strategy:
      matrix:
        app: [tauri, tauri-admin]
        include:
          - app: tauri
            binary: quiztool-tauri
          - app: tauri-admin
            binary: quiztool-admin
    defaults:
      run:
        working-directory: ./${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.app }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify binary exists
        run: |
          if (-Not (Test-Path "target/release/${{ matrix.binary }}.exe")) {
            Write-Error "Binary not found at target/release/${{ matrix.binary }}.exe"
            exit 1
          }
          Write-Host "Binary size: $((Get-Item "target/release/${{ matrix.binary }}.exe").Length / 1KB) KB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-windows-x86_64
          path: ${{ matrix.app }}/target/release/${{ matrix.binary }}.exe
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.app }}/target/release/${{ matrix.binary }}.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (x86_64) - ${{ matrix.app }}
    runs-on: macos-latest
    strategy:
      matrix:
        app: [tauri, tauri-admin]
        include:
          - app: tauri
            binary: quiztool-tauri
          - app: tauri-admin
            binary: quiztool-admin
    defaults:
      run:
        working-directory: ./${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.app }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/${{ matrix.binary }}" ]; then
            echo "Binary not found at target/release/${{ matrix.binary }}"
            exit 1
          fi
          echo "Binary size: $(du -h target/release/${{ matrix.binary }} | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-macos-x86_64
          path: ${{ matrix.app }}/target/release/${{ matrix.binary }}
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.app }}/target/release/${{ matrix.binary }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (x86_64) - ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tauri, tauri-admin]
        include:
          - app: tauri
            binary: quiztool-tauri
          - app: tauri-admin
            binary: quiztool-admin
    defaults:
      run:
        working-directory: ./${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.app }}

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip debug symbols
        run: strip target/release/${{ matrix.binary }}

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/${{ matrix.binary }}" ]; then
            echo "Binary not found at target/release/${{ matrix.binary }}"
            exit 1
          fi
          echo "Binary size: $(du -h target/release/${{ matrix.binary }} | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-linux-x86_64
          path: ${{ matrix.app }}/target/release/${{ matrix.binary }}
          compression-level: 0

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.app }}/target/release/${{ matrix.binary }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-summary:
    name: Release Summary
    needs: [build-windows, build-macos, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Generate build matrix summary
        run: |
          echo "## 🏗️ Tauri Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Platform | Status | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|----------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          
          # Matrix jobs are named 'Job Name (matrix_value1, matrix_value2, ...)'
          # We need to map the results carefully or just list them.
          # Since it's a summary, we can just echo the general status.
          
          echo "| Generator | 🪟 Windows | ${{ needs.build-windows.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-windows-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Generator | 🍎 macOS | ${{ needs.build-macos.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-macos-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Generator | 🐧 Linux | ${{ needs.build-linux.result == 'success' && '✅' || '❌' }} | \`quiztool-tauri-linux-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Dashboard | 🪟 Windows | ${{ needs.build-windows.result == 'success' && '✅' || '❌' }} | \`quiztool-admin-windows-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Dashboard | 🍎 macOS | ${{ needs.build-macos.result == 'success' && '✅' || '❌' }} | \`quiztool-admin-macos-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Dashboard | 🐧 Linux | ${{ needs.build-linux.result == 'success' && '✅' || '❌' }} | \`quiztool-admin-linux-x86_64\` |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: **${{ github.ref_type }}** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY