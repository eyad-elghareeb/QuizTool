# Build the Tauri Desktop EXEs on release tags and attach to GitHub Release
name: Build Tauri Release

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag for manual build (leave empty to use latest commit)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-admin
            tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Admin Dashboard (Bundled)
        run: cargo tauri build
        working-directory: ./tauri-admin

      - name: Build Project Generator (Bundled)
        run: cargo tauri build
        working-directory: ./tauri

      - name: Upload Generator EXE
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-windows-x86_64
          path: tauri/target/release/quiztool-tauri.exe

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-admin-windows-x86_64
          path: tauri-admin/target/release/quiztool-admin.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            tauri/target/release/quiztool-tauri.exe
            tauri-admin/target/release/quiztool-admin.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest
    env:
      TAURI_BUNDLER_DMG_IGNORE_CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-admin
            tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Admin Dashboard (Bundled)
        run: cargo tauri build
        working-directory: ./tauri-admin

      - name: Prepare admin binary for Generator bundling
        run: cp tauri-admin/target/release/bundle/dmg/*.dmg tauri-admin/target/release/quiztool-admin.dmg

      - name: Build Project Generator (Bundled)
        run: cargo tauri build
        working-directory: ./tauri

      - name: Upload Generator DMG
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-macos-aarch64
          path: tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Admin DMG
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-admin-macos-aarch64
          path: tauri-admin/target/release/bundle/dmg/*.dmg

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            tauri/target/release/bundle/dmg/*.dmg
            tauri-admin/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-admin
            tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Admin Dashboard (Bundled)
        run: cargo tauri build --bundles appimage
        working-directory: ./tauri-admin

      - name: Prepare admin binary for Generator bundling
        run: cp tauri-admin/target/release/bundle/appimage/*.AppImage tauri-admin/target/release/quiztool-admin.AppImage

      - name: Build Project Generator (Bundled)
        run: cargo tauri build --bundles appimage
        working-directory: ./tauri

      - name: Strip debug symbols
        run: |
          strip tauri/target/release/quiztool-tauri
          strip tauri-admin/target/release/quiztool-admin

      - name: Upload Generator AppImage
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-tauri-linux-x86_64
          path: tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Admin AppImage
        uses: actions/upload-artifact@v4
        with:
          name: quiztool-admin-linux-x86_64
          path: tauri-admin/target/release/bundle/appimage/*.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            tauri/target/release/bundle/appimage/*.AppImage
            tauri-admin/target/release/bundle/appimage/*.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}